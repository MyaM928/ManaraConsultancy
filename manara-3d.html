  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ay:none}\n    #hint{gap:14px;font-size:10.5px}\n    #panel{padding:32px 26px 26px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"app\"><\u002Fdiv>\n<div id=\"labels\"><\u002Fdiv>\n\n<div id=\"brand\" class=\"hud\">\n  <div class=\"mark\"><span class=\"beacon\"><\u002Fspan><h1>MANARA<\u002Fh1><\u002Fdiv>\n  <p class=\"tag\"><b>A fixed point in changing waters.<\u002Fb><br>Advisory, AI &amp; growth for founders across five markets.<\u002Fp>\n<\u002Fdiv>\n\n<div id=\"markets\" class=\"hud\">\n  <div class=\"title\">Where we operate<\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"hint\" class=\"hud\">\n  <span><i><\u002Fi>Drag to rotate<\u002Fspan>\n  <span><i><\u002Fi>Scroll to zoom<\u002Fspan>\n  <span><i><\u002Fi>Click a node<\u002Fspan>\n<\u002Fdiv>\n\n<div id=\"tip\"><\u002Fdiv>\n\n<aside id=\"panel\">\n  <button class=\"close\" aria-label=\"Close\">✕<\u002Fbutton>\n  <div class=\"accent\"><\u002Fdiv>\n  <p class=\"kicker\" id=\"p-kicker\">Service<\u002Fp>\n  <h2 id=\"p-title\">Title<\u002Fh2>\n  <p class=\"desc\" id=\"p-desc\"><\u002Fp>\n  <ul id=\"p-list\"><\u002Ful>\n  <div class=\"foot\">\n    Part of the Manara advisory suite.\n    <br><a class=\"cta\" id=\"p-cta\" href=\"https://manaraconsultancy.online/\" target=\"_blank\" rel=\"noopener\">Book a discovery call →<\u002Fa>\n  <\u002Fdiv>\n<\u002Faside>\n\n<div id=\"intro\">\n  <div>\n    <div class=\"beacon2\"><\u002Fdiv>\n    <p>Charting the harbour<\u002Fp>\n    <div class=\"bar\"><b id=\"introbar\"><\u002Fb><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script type=\"module\">\nimport * as THREE from 'three';\nimport { OrbitControls } from 'three/addons/controls/OrbitControls.js';\n\n/* ---------- data ---------- */\nconst SERVICES = [\n  { key:'ai', name:'AI Agents', kicker:'Automation & AI', color:'#38e1ff',\n    desc:'Custom AI assistants and workflows that absorb the busywork — so your team compounds output, not hours.',\n    points:['24/7 AI support & sales agents','Workflow & data automation','RAG chatbots trained on your docs'] },\n  { key:'social', name:'Social Content', kicker:'Content & Campaigns', color:'#ff4d9d',\n    desc:'Scroll-stopping content engineered to grow reach, trust and pipeline across every platform.',\n    points:['Content strategy & calendars','Short-form video & design','Paid + organic campaigns'] },\n  { key:'linkedin', name:'LinkedIn Growth', kicker:'Personal Branding', color:'#4f9dff',\n    desc:'Turn founders and execs into recognised voices that attract clients, talent and investors.',\n    points:['Profile & positioning overhaul','Ghostwritten thought leadership','Inbound lead systems'] },\n  { key:'hr', name:'HR & Talent', kicker:'People Operations', color:'#35e0a1',\n    desc:'Build the team and the systems behind it — from first hire to scaled people ops.',\n    points:['Recruitment & headhunting','HR policies & onboarding','Performance frameworks'] },\n  { key:'tender', name:'Tenders & Bids', kicker:'Bid Management', color:'#ffb020',\n    desc:'Win more public and private tenders with sharp, compliant and persuasive submissions.',\n    points:['Bid strategy & writing','Compliance & formatting','Win-theme development'] },\n  { key:'career', name:'Career Coaching', kicker:'Careers', color:'#a06bff',\n    desc:'Land the role you deserve with CVs, interview prep and strategy that actually get replies.',\n    points:['CV & LinkedIn rewrite','Interview coaching','Career roadmapping'] },\n  { key:'web', name:'Web Design', kicker:'Design & Build', color:'#ff7a45',\n    desc:'Fast, modern, conversion-focused websites that make the right first impression.',\n    points:['Brand & UX design','Responsive build','SEO & analytics'] },\n];\n\nconst MARKETS = [\n  { name:'Beirut', note:'HQ', lat:33.89, lon:35.50, hq:true },\n  { name:'London', note:'UK', lat:51.51, lon:-0.13 },\n  { name:'New York', note:'USA', lat:40.71, lon:-74.0 },\n  { name:'Toronto', note:'Canada', lat:43.65, lon:-79.38 },\n  { name:'Dubai', note:'UAE', lat:25.20, lon:55.27 },\n];\n\n/* ---------- renderer / scene ---------- */\nconst app = document.getElementById('app');\nconst renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });\nrenderer.setPixelRatio(Math.min(devicePixelRatio,2));\nrenderer.setSize(innerWidth, innerHeight);\nrenderer.outputColorSpace = THREE.SRGBColorSpace;\napp.appendChild(renderer.domElement);\n\nconst scene = new THREE.Scene();\nscene.background = new THREE.Color('#05060f');\nscene.fog = new THREE.FogExp2('#070813', 0.024);\n\nconst camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.1, 200);\ncamera.position.set(0.5, 3.2, 10.5);\n\nconst controls = new OrbitControls(camera, renderer.domElement);\ncontrols.enableDamping = true;\ncontrols.dampingFactor = 0.06;\ncontrols.target.set(0, 0.4, 0);\ncontrols.minDistance = 5.5;\ncontrols.maxDistance = 18;\ncontrols.autoRotate = true;\ncontrols.autoRotateSpeed = 0.55;\ncontrols.enablePan = false;\n\n/* idle → resume auto-rotate */\nlet idleTimer;\ncontrols.addEventListener('start', ()=>{ controls.autoRotate=false; clearTimeout(idleTimer); });\ncontrols.addEventListener('end', ()=>{ clearTimeout(idleTimer); idleTimer=setTimeout(()=>controls.autoRotate=true, 3500); });\n\n/* ---------- lights ---------- */\nscene.add(new THREE.AmbientLight('#5f7690', 0.8));\nconst key = new THREE.DirectionalLight('#cfe4ff', 1.25); key.position.set(4,7,9); scene.add(key);\nconst rim = new THREE.DirectionalLight('#2a6cff', 0.7); rim.position.set(-8,-2,-6); scene.add(rim);\n\n/* ---------- cosmic background: stars + nebula + shooting stars ---------- */\n// soft radial glow texture (reused by nebula + star sprites)\nfunction glowTexture(inner='rgba(255,255,255,1)', outer='rgba(255,255,255,0)'){\n  const c=document.createElement('canvas'); c.width=c.height=128;\n  const x=c.getContext('2d'); const g=x.createRadialGradient(64,64,0,64,64,64);\n  g.addColorStop(0,inner); g.addColorStop(0.4,inner.replace('1)','0.55)')); g.addColorStop(1,outer);\n  x.fillStyle=g; x.fillRect(0,0,128,128);\n  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;\n}\nconst softGlow=glowTexture();\n\nconst bgTwinkle=[];   // sprite stars that pulse\nconst nebulae=[];     // drifting clouds\nconst meteors=[];     // shooting stars\n\n// 1) deep starfield — three tinted point layers, slow drift\nconst starTints=['#eaf2ff','#bcd3ff','#ffe6c4'];\nconst starLayers=[];\nstarTints.forEach((tint,li)=>{\n  const N=900, pos=new Float32Array(N*3);\n  for(let i=0;i<N;i++){\n    const r=55+Math.random()*90, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);\n    pos[i*3]=r*Math.sin(p)*Math.cos(t); pos[i*3+1]=r*Math.cos(p); pos[i*3+2]=r*Math.sin(p)*Math.sin(t);\n  }\n  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));\n  const m=new THREE.PointsMaterial({color:tint,size:0.10+li*0.05,map:softGlow,transparent:true,\n    opacity:0.55+li*0.12,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true});\n  const pts=new THREE.Points(g,m); scene.add(pts);\n  starLayers.push({pts,base:m.opacity,ph:Math.random()*6,spd:0.00002+li*0.00001});\n});\n\n// 2) big twinkling foreground stars (sprites)\nfor(let i=0;i<70;i++){\n  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:softGlow,\n    color:starTints[i%3],transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,fog:false}));\n  const r=50+Math.random()*70, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);\n  s.position.set(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t));\n  const sc=0.5+Math.random()*1.3; s.scale.setScalar(sc);\n  scene.add(s); bgTwinkle.push({s,base:sc,ph:Math.random()*Math.PI*2,spd:1.2+Math.random()*2.5});\n}\n\n// 3) nebula clouds — large additive sprites in cosmic hues\nconst nebColors=['#4650c8','#1f8f9e','#8a2f7a','#c98a2a','#2f6ad0','#5a3fb0'];\nnebColors.forEach((col,i)=>{\n  const tex=glowTexture(new THREE.Color(col).getStyle().replace('rgb','rgba').replace(')',',1)'),'rgba(0,0,0,0)');\n  const m=new THREE.SpriteMaterial({map:tex,color:col,transparent:true,opacity:0.0,\n    depthWrite:false,blending:THREE.AdditiveBlending,fog:false});\n  const s=new THREE.Sprite(m);\n  // spread across the backdrop behind the globe, biased into view\n  const r=42+Math.random()*34;\n  const t=(-0.5+i/nebColors.length)*Math.PI*2 + (Math.random()-0.5);\n  s.position.set(Math.cos(t)*r, (Math.random()-0.4)*32, -r*0.6-Math.random()*24);\n  const sc=30+Math.random()*26; s.scale.setScalar(sc);\n  scene.add(s);\n  nebulae.push({s,base:0.24+Math.random()*0.16,ph:Math.random()*Math.PI*2,spd:0.12+Math.random()*0.15,\n    rot:(Math.random()-0.5)*0.02, drift:(Math.random()-0.5)*0.6});\n});\n\n// 3b) aurora curtains — flowing shader backdrop behind everything\nconst auroraMat=new THREE.ShaderMaterial({\n  transparent:true, depthWrite:false, depthTest:false,\n  blending:THREE.AdditiveBlending, fog:false, side:THREE.DoubleSide,\n  uniforms:{ uTime:{value:0} },\n  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,\n  fragmentShader:`\n    varying vec2 vUv; uniform float uTime;\n    float hash(vec2 p){return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5453);}\n    float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);\n      float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));\n      return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}\n    float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.02;a*=0.5;}return v;}\n    void main(){\n      vec2 uv=vUv; float t=uTime*0.045;\n      float flow=fbm(vec2(uv.x*3.0+t, uv.y*1.3 - t*0.5));\n      float curtain=fbm(vec2(uv.x*7.0 - t*1.2 + flow*1.6, uv.y*2.2 + t*0.2));\n      float band=smoothstep(0.02,0.42,uv.y)*smoothstep(1.0,0.45,uv.y);\n      float inten=pow(curtain,1.7)*band;\n      vec3 cA=vec3(0.16,0.95,0.62), cB=vec3(0.25,0.5,1.0), cC=vec3(0.72,0.28,1.0), cD=vec3(1.0,0.32,0.78);\n      vec3 col=mix(cA,cB,uv.y);\n      col=mix(col,cC,smoothstep(0.35,0.9,flow));\n      col=mix(col,cD,smoothstep(0.6,1.0,curtain)*0.5);\n      float glow=fbm(vec2(uv.x*1.5-t*0.3,uv.y*1.0))*band*0.25;\n      gl_FragColor=vec4(col*(inten*0.75+glow*0.5), 1.0);\n    }`\n});\nconst aurora=new THREE.Mesh(new THREE.PlaneGeometry(340,190), auroraMat);\naurora.renderOrder=-2; scene.add(aurora);\nconst _bd=new THREE.Vector3();\n\n// 4) shooting stars — billboarded trails in a camera-facing layer\nconst meteorLayer=new THREE.Group(); scene.add(meteorLayer);\nconst trailTex=(function(){\n  const c=document.createElement('canvas'); c.width=256; c.height=16;\n  const x=c.getContext('2d'); const g=x.createLinearGradient(0,0,256,0);\n  g.addColorStop(0,'rgba(255,255,255,0)'); g.addColorStop(0.72,'rgba(200,225,255,0.5)');\n  g.addColorStop(0.96,'rgba(255,255,255,1)'); g.addColorStop(1,'rgba(255,255,255,0)');\n  x.fillStyle=g; x.fillRect(0,0,256,16);\n  // soft vertical falloff\n  const vg=x.createLinearGradient(0,0,0,16);\n  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(0.5,'rgba(255,255,255,0.0)'); vg.addColorStop(1,'rgba(0,0,0,0)');\n  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;\n})();\nfor(let i=0;i<5;i++){\n  const g=new THREE.Group();\n  const trail=new THREE.Mesh(new THREE.PlaneGeometry(9,0.28),\n    new THREE.MeshBasicMaterial({map:trailTex,transparent:true,depthWrite:false,\n      blending:THREE.AdditiveBlending,fog:false,opacity:0}));\n  g.add(trail);\n  const head=new THREE.Sprite(new THREE.SpriteMaterial({map:softGlow,color:'#eaf4ff',\n    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,fog:false,opacity:0}));\n  head.scale.setScalar(1.2); head.position.x=4.5; g.add(head);\n  meteorLayer.add(g);\n  meteors.push({g,trail,head,active:false,delay:1+Math.random()*6,x:0,y:0,ang:0,speed:0,life:0,dur:1});\n}\nfunction launchMeteor(m){\n  m.active=true; m.life=0; m.dur=0.7+Math.random()*0.7;\n  m.ang=(-0.62+Math.random()*0.5); // mostly downward-right\n  const span=44;\n  m.x=-span*0.5+Math.random()*10; m.y=10+Math.random()*22;\n  m.speed=(span+20)/m.dur; // units/sec across\n  m.g.rotation.z=m.ang;\n  m.g.scale.setScalar(0.7+Math.random()*0.9);\n}\n\nfunction updateBackground(now,dt){\n  const tS=now*0.001;\n  auroraMat.uniforms.uTime.value=tS;\n  // keep aurora as a backdrop directly behind the scene from the camera\n  _bd.copy(camera.position).setLength(1).multiplyScalar(-150);\n  aurora.position.copy(_bd); aurora.quaternion.copy(camera.quaternion);\n  starLayers.forEach(L=>{ L.pts.rotation.y+=L.spd; L.pts.rotation.x+=L.spd*0.5;\n    L.pts.material.opacity=L.base*(0.75+0.25*Math.sin(tS*0.6+L.ph)); });\n  bgTwinkle.forEach(o=>{ const k=0.55+0.45*Math.sin(tS*o.spd+o.ph);\n    o.s.material.opacity=k; o.s.scale.setScalar(o.base*(0.7+0.5*k)); });\n  nebulae.forEach(o=>{ o.s.material.opacity=o.base*(0.7+0.3*Math.sin(tS*o.spd+o.ph));\n    o.s.material.rotation+=o.rot*dt; o.s.position.x+=o.drift*dt; });\n  // shooting stars\n  meteorLayer.quaternion.copy(camera.quaternion);\n  meteors.forEach(m=>{\n    if(!m.active){ m.delay-=dt; if(m.delay<=0){ launchMeteor(m); } return; }\n    m.life+=dt; const p=m.life/m.dur;\n    if(p>=1){ m.active=false; m.delay=2+Math.random()*7; m.trail.material.opacity=0; m.head.material.opacity=0; return; }\n    m.x+=Math.cos(m.ang)*m.speed*dt; m.y+=Math.sin(m.ang)*m.speed*dt;\n    m.g.position.set(m.x,m.y,-42);\n    const fade=Math.sin(Math.min(1,p)*Math.PI); // in-out\n    m.trail.material.opacity=fade; m.head.material.opacity=fade;\n  });\n}\n\n/* ---------- helpers ---------- */\nconst R = 2.55;\nfunction latLonToVec3(lat, lon, radius=R){\n  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;\n  return new THREE.Vector3(\n    -radius*Math.sin(phi)*Math.cos(theta),\n     radius*Math.cos(phi),\n     radius*Math.sin(phi)*Math.sin(theta));\n}\n\n/* ---------- globe (dot sphere with burst reveal) ---------- */\nconst globe = new THREE.Group(); scene.add(globe);\n\nconst coreGeo = new THREE.SphereGeometry(R*0.985, 48, 48);\nconst coreMat = new THREE.MeshStandardMaterial({ color:'#0f3a5f', emissive:'#0a2740', emissiveIntensity:0.5,\n  roughness:0.7, metalness:0.25, transparent:true, opacity:0.97 });\nglobe.add(new THREE.Mesh(coreGeo, coreMat));\n// faint atmosphere\nconst atmo = new THREE.Mesh(new THREE.SphereGeometry(R*1.14,48,48),\n  new THREE.MeshBasicMaterial({ color:'#2f7bff', transparent:true, opacity:0.06, side:THREE.BackSide }));\nglobe.add(atmo);\n\n// dot matrix\nconst DN = 2600;\nconst dotTarget = new Float32Array(DN*3);\nconst dotStart  = new Float32Array(DN*3);\nconst dotPos    = new Float32Array(DN*3);\nconst dotColor  = new Float32Array(DN*3);\n// pseudo-continents: layered sines pick land vs ocean\nfunction landField(x,y,z){\n  return Math.sin(x*3.1+y*1.7)*0.5 + Math.sin(y*4.3-z*2.1)*0.35\n       + Math.sin(z*3.7+x*2.9)*0.4 + Math.sin((x+y+z)*5.0)*0.22\n       + Math.sin(x*7.0-y*5.0)*0.15;\n}\nconst ocA=new THREE.Color('#1657b8'), ocB=new THREE.Color('#37a8e6');\nconst lnA=new THREE.Color('#2f9e50'), lnB=new THREE.Color('#7fd469');\nconst _c=new THREE.Color();\nfor(let i=0;i<DN;i++){\n  const y=1-(i/(DN-1))*2, r=Math.sqrt(1-y*y), th=i*2.399963;\n  const v=new THREE.Vector3(Math.cos(th)*r, y, Math.sin(th)*r).multiplyScalar(R*1.002);\n  dotTarget[i*3]=v.x; dotTarget[i*3+1]=v.y; dotTarget[i*3+2]=v.z;\n  const nx=Math.cos(th)*r, ny=y, nz=Math.sin(th)*r;\n  const f=landField(nx,ny,nz);\n  if(f>0.42){ _c.copy(lnA).lerp(lnB, Math.min(1,(f-0.42)*1.4)); } // land\n  else { _c.copy(ocA).lerp(ocB, Math.max(0,Math.min(1,(f+0.9)*0.6))); }        // ocean\n  dotColor[i*3]=_c.r; dotColor[i*3+1]=_c.g; dotColor[i*3+2]=_c.b;\n  const s=v.clone().normalize().multiplyScalar(R*(2.2+Math.random()*3.5))\n        .add(new THREE.Vector3((Math.random()-.5)*6,(Math.random()-.5)*6,(Math.random()-.5)*6));\n  dotStart[i*3]=s.x; dotStart[i*3+1]=s.y; dotStart[i*3+2]=s.z;\n}\ndotPos.set(dotStart);\nconst dotGeo=new THREE.BufferGeometry();\ndotGeo.setAttribute('position',new THREE.BufferAttribute(dotPos,3));\ndotGeo.setAttribute('color',new THREE.BufferAttribute(dotColor,3));\nconst dotMat=new THREE.PointsMaterial({size:0.06,vertexColors:true,transparent:true,opacity:1.0,depthWrite:false});\nconst dots=new THREE.Points(dotGeo,dotMat); globe.add(dots);\n\n// thin lat/long rings for structure\nconst ringMat=new THREE.LineBasicMaterial({color:'#2b5f86',transparent:true,opacity:0.28});\nfor(let k=-2;k<=2;k++){\n  const lat=k*30, rr=R*Math.cos(lat*Math.PI/180)*1.003, yy=R*Math.sin(lat*Math.PI/180)*1.003;\n  const pts=[]; for(let a=0;a<=64;a++){const t=a/64*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(t)*rr,yy,Math.sin(t)*rr));}\n  globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),ringMat));\n}\n\n/* ---------- market pins + arcs ---------- */\nconst pinGroup=new THREE.Group(); globe.add(pinGroup);\nconst pins=[];\nconst beirut=latLonToVec3(MARKETS[0].lat,MARKETS[0].lon);\nMARKETS.forEach((mk,i)=>{\n  const p=latLonToVec3(mk.lat,mk.lon);\n  const col=mk.hq?'#ffd37a':'#57e0ff';\n  const g=new THREE.Group(); g.position.copy(p);\n  const up=new THREE.Vector3(0,1,0), n=p.clone().normalize();\n  g.quaternion.setFromUnitVectors(up,n);\n  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.34,8),\n    new THREE.MeshBasicMaterial({color:col}));\n  stem.position.y=0.17; g.add(stem);\n  const bulb=new THREE.Mesh(new THREE.SphereGeometry(mk.hq?0.075:0.055,16,16),\n    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.4,roughness:0.3}));\n  bulb.position.y=0.36; g.add(bulb);\n  const ring=new THREE.Mesh(new THREE.RingGeometry(0.07,0.1,28),\n    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6,side:THREE.DoubleSide}));\n  ring.rotation.x=-Math.PI/2; g.add(ring);\n  pinGroup.add(g);\n  pins.push({grp:g,ring,base:mk.hq?0.075:0.055,bulb,phase:i});\n\n  // arc from HQ\n  if(!mk.hq){\n    const mid=beirut.clone().add(p).multiplyScalar(0.5).normalize()\n      .multiplyScalar(R*(1+0.16+beirut.distanceTo(p)*0.10));\n    const curve=new THREE.QuadraticBezierCurve3(beirut,mid,p);\n    const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,40,0.008,8,false),\n      new THREE.MeshBasicMaterial({color:'#57e0ff',transparent:true,opacity:0.35}));\n    globe.add(tube);\n    const trav=new THREE.Mesh(new THREE.SphereGeometry(0.035,12,12),\n      new THREE.MeshBasicMaterial({color:'#bff2ff'}));\n    globe.add(trav);\n    pins[pins.length-1].arc={curve,trav,off:i*0.17};\n  }\n});\n\n/* extra presence nodes — on globe only, NOT in the legend */\nconst EXTRA_NODES=[\n  {name:'China', lat:39.9, lon:116.4},\n  {name:'Indonesia', lat:-6.2, lon:106.8},\n  {name:'Egypt', lat:30.0, lon:31.2},\n  {name:'France', lat:48.85, lon:2.35},\n  {name:'Italy', lat:41.9, lon:12.5},\n  {name:'Spain', lat:40.4, lon:-3.7},\n];\nEXTRA_NODES.forEach((mk,i)=>{\n  const p=latLonToVec3(mk.lat,mk.lon);\n  const col='#57e0ff';\n  const g=new THREE.Group(); g.position.copy(p);\n  g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), p.clone().normalize());\n  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,0.24,8),\n    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.8}));\n  stem.position.y=0.12; g.add(stem);\n  const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.045,14,14),\n    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.2,roughness:0.3}));\n  bulb.position.y=0.25; g.add(bulb);\n  const ring=new THREE.Mesh(new THREE.RingGeometry(0.055,0.08,24),\n    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5,side:THREE.DoubleSide}));\n  ring.rotation.x=-Math.PI/2; g.add(ring);\n  pinGroup.add(g);\n  pins.push({grp:g,ring,base:0.045,bulb,phase:i+1.5});\n  // connector arc from HQ (dimmer than core markets)\n  const mid=beirut.clone().add(p).multiplyScalar(0.5).normalize()\n    .multiplyScalar(R*(1+0.14+beirut.distanceTo(p)*0.09));\n  const curve=new THREE.QuadraticBezierCurve3(beirut,mid,p);\n  const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,40,0.006,8,false),\n    new THREE.MeshBasicMaterial({color:'#57e0ff',transparent:true,opacity:0.2}));\n  globe.add(tube);\n  const trav=new THREE.Mesh(new THREE.SphereGeometry(0.028,12,12),\n    new THREE.MeshBasicMaterial({color:'#bff2ff'}));\n  globe.add(trav);\n  pins[pins.length-1].arc={curve,trav,off:i*0.21+0.3};\n});\n\n/* ---------- lighthouse (the Manara) ---------- */\nconst light=new THREE.Group();\nconst topN=beirut.clone().normalize();\nlight.position.copy(beirut);\nlight.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), topN);\nlight.scale.setScalar(0.74);\nglobe.add(light);\n\nconst whiteM=new THREE.MeshStandardMaterial({color:'#eef3f7',roughness:0.55,metalness:0.05});\nconst redM=new THREE.MeshStandardMaterial({color:'#e04b4b',roughness:0.5});\nconst darkM=new THREE.MeshStandardMaterial({color:'#16324a',roughness:0.4,metalness:0.3});\n// tapered tower\nconst tower=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.2,0.95,28),whiteM);\ntower.position.y=0.475; light.add(tower);\n// red bands\n[0.28,0.55,0.82].forEach(h=>{\n  const rr=0.2-(0.07)*(h/0.95);\n  const band=new THREE.Mesh(new THREE.CylinderGeometry(rr+0.006,rr+0.02,0.11,28),redM);\n  band.position.y=h; light.add(band);\n});\n// gallery\nconst gal=new THREE.Mesh(new THREE.CylinderGeometry(0.17,0.17,0.05,28),darkM);\ngal.position.y=0.97; light.add(gal);\n// lantern room (glass, emissive)\nconst lanternM=new THREE.MeshStandardMaterial({color:'#ffe9b0',emissive:'#ffd37a',emissiveIntensity:2.2,\n  transparent:true,opacity:0.92,roughness:0.2});\nconst lantern=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.16,16),lanternM);\nlantern.position.y=1.06; light.add(lantern);\n// roof\nconst roof=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.16,20),redM);\nroof.position.y=1.22; light.add(roof);\nconst finial=new THREE.Mesh(new THREE.SphereGeometry(0.03,10,10),\n  new THREE.MeshStandardMaterial({color:'#ffd37a',emissive:'#ffd37a',emissiveIntensity:1.5}));\nfinial.position.y=1.32; light.add(finial);\n\n/* ---- waves crashing over the lighthouse base ---- */\nconst waves=[];\n// dark sea disc at the base\nconst sea=new THREE.Mesh(new THREE.CircleGeometry(0.72,40),\n  new THREE.MeshStandardMaterial({color:'#0f4f86',roughness:0.35,metalness:0.4,\n    transparent:true,opacity:0.7}));\nsea.rotation.x=-Math.PI/2; sea.position.y=0.015; light.add(sea);\n// expanding foam ripple rings\nconst ripples=[];\nfor(let i=0;i<4;i++){\n  const ring=new THREE.Mesh(new THREE.RingGeometry(0.24,0.3,40),\n    new THREE.MeshBasicMaterial({color:'#bfeeff',transparent:true,opacity:0,\n      side:THREE.DoubleSide,depthWrite:false}));\n  ring.rotation.x=-Math.PI/2; ring.position.y=0.03; light.add(ring);\n  ripples.push({m:ring,ph:i/4});\n}\n// crashing spray particles that leap up the tower\nconst SP=140;\nconst spPos=new Float32Array(SP*3), spVel=new Float32Array(SP*3), spLife=new Float32Array(SP);\nfunction seedSpray(i,burst){\n  const a=Math.random()*Math.PI*2, rad=0.19+Math.random()*0.06;\n  spPos[i*3]=Math.cos(a)*rad; spPos[i*3+1]=0.02+Math.random()*0.05; spPos[i*3+2]=Math.sin(a)*rad;\n  const up=(burst?0.9:0.5)+Math.random()*0.7;\n  spVel[i*3]=Math.cos(a)*(0.15+Math.random()*0.25);\n  spVel[i*3+1]=up;\n  spVel[i*3+2]=Math.sin(a)*(0.15+Math.random()*0.25);\n  spLife[i]=0.5+Math.random()*0.7;\n}\nfor(let i=0;i<SP;i++) seedSpray(i,false);\nconst spGeo=new THREE.BufferGeometry();\nspGeo.setAttribute('position',new THREE.BufferAttribute(spPos,3));\nconst spMat=new THREE.PointsMaterial({color:'#e8faff',size:0.055,map:softGlow,transparent:true,\n  opacity:0.95,depthWrite:false,blending:THREE.AdditiveBlending});\nconst spray=new THREE.Points(spGeo,spMat); light.add(spray);\nlet surge=0;\nfunction updateWaves(now,dt){\n  const tS=now*0.001;\n  sea.material.emissiveIntensity=0;\n  // gentle sea bob\n  sea.position.y=0.015+Math.sin(tS*1.4)*0.008;\n  // ripples expand & fade on loop\n  ripples.forEach(rp=>{\n    let t=((tS*0.5)+rp.ph)%1;\n    const sc=1+t*3.2; rp.m.scale.setScalar(sc);\n    rp.m.material.opacity=0.5*(1-t)*(1-t);\n  });\n  // periodic wave surge — bigger crash every few seconds\n  surge=Math.max(0, Math.sin(tS*0.7))*Math.max(0,Math.sin(tS*0.7));\n  for(let i=0;i<SP;i++){\n    spLife[i]-=dt;\n    if(spLife[i]<=0){ seedSpray(i, surge>0.6); continue; }\n    spVel[i*3+1]-=1.9*dt; // gravity\n    spPos[i*3]+=spVel[i*3]*dt;\n    spPos[i*3+1]+=spVel[i*3+1]*dt;\n    spPos[i*3+2]+=spVel[i*3+2]*dt;\n    if(spPos[i*3+1]<0.01){ seedSpray(i,false); }\n  }\n  spGeo.attributes.position.needsUpdate=true;\n  spMat.opacity=0.8+0.2*surge;\n}\n\n/* ---- UFO + alien + flag sequence (in lighthouse-local space) ---- */\nconst metalM=new THREE.MeshStandardMaterial({color:'#b9c6d4',roughness:0.28,metalness:0.9});\nconst domeM=new THREE.MeshStandardMaterial({color:'#7ff0ff',emissive:'#33d6ff',emissiveIntensity:1.6,\n  roughness:0.1,metalness:0.2,transparent:true,opacity:0.75});\nconst alienM=new THREE.MeshStandardMaterial({color:'#7ed957',emissive:'#2f8f2a',emissiveIntensity:0.35,roughness:0.5});\nconst eyeM=new THREE.MeshStandardMaterial({color:'#0a0f12',roughness:0.2,metalness:0.3});\n\n// UFO\nconst ufo=new THREE.Group(); light.add(ufo);\nconst saucer=new THREE.Mesh(new THREE.SphereGeometry(0.5,32,20),metalM);\nsaucer.scale.set(1,0.3,1); ufo.add(saucer);\nconst belly=new THREE.Mesh(new THREE.SphereGeometry(0.34,24,16),\n  new THREE.MeshStandardMaterial({color:'#5f6f80',roughness:0.4,metalness:0.7}));\nbelly.scale.set(1,0.55,1); belly.position.y=-0.09; ufo.add(belly);\nconst dome=new THREE.Mesh(new THREE.SphereGeometry(0.22,24,16),domeM);\ndome.position.y=0.1; ufo.add(dome);\nconst ufoRim=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.028,10,40),\n  new THREE.MeshStandardMaterial({color:'#ffd37a',roughness:0.3,metalness:0.9}));\nufoRim.rotation.x=Math.PI/2; ufo.add(ufoRim);\nconst ufoLights=[];\nfor(let i=0;i<8;i++){\n  const a=i/8*Math.PI*2;\n  const b=new THREE.Mesh(new THREE.SphereGeometry(0.035,10,10),\n    new THREE.MeshStandardMaterial({color:'#ffe08a',emissive:'#ffcf5a',emissiveIntensity:1.5}));\n  b.position.set(Math.cos(a)*0.48,-0.02,Math.sin(a)*0.48); ufo.add(b); ufoLights.push(b);\n}\n// tractor beam (light child so it spans ufo→ground)\nconst beam2=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.55,1,24,1,true),\n  new THREE.MeshBasicMaterial({color:'#66e6ff',transparent:true,opacity:0,\n    blending:THREE.AdditiveBlending,depthWrite:false,fog:false,side:THREE.DoubleSide}));\nlight.add(beam2); beam2.visible=false;\n\n// Alien\nconst alien=new THREE.Group(); light.add(alien);\nconst aBody=new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16),alienM);\naBody.scale.set(1,1.4,1); aBody.position.y=0.1; alien.add(aBody);\nconst aHead=new THREE.Mesh(new THREE.SphereGeometry(0.1,20,16),alienM);\naHead.scale.set(1.1,1,1.1); aHead.position.y=0.26; alien.add(aHead);\n[[-0.045,0.045],[0.045,0.045]].forEach(([ex])=>{\n  const eye=new THREE.Mesh(new THREE.SphereGeometry(0.03,12,12),eyeM);\n  eye.scale.set(1,1.5,0.6); eye.position.set(ex,0.27,0.085); alien.add(eye);\n});\n[[-0.07,1],[0.07,-1]].forEach(([lx])=>{\n  const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.014,0.014,0.13,8),alienM);\n  arm.position.set(lx,0.12,0); arm.rotation.z=lx>0?0.5:-0.5; alien.add(arm);\n  const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.016,0.016,0.09,8),alienM);\n  leg.position.set(lx*0.5,0.02,0); alien.add(leg);\n});\nalien.visible=false;\n\n// Flag (planted permanently once raised) — grows from its base\nconst flag=new THREE.Group(); light.add(flag);\nflag.position.set(0.15,0.99,0.05);\nconst pole=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,0.5,10),\n  new THREE.MeshStandardMaterial({color:'#e9edf1',roughness:0.4,metalness:0.5}));\npole.position.y=0.25; flag.add(pole);\nconst cloth=new THREE.Mesh(new THREE.PlaneGeometry(0.26,0.16,8,1),\n  new THREE.MeshStandardMaterial({color:'#ffd37a',emissive:'#ffb020',emissiveIntensity:0.3,\n    roughness:0.6,side:THREE.DoubleSide}));\ncloth.position.set(0.14,0.42,0); flag.add(cloth);\nconst emblem=new THREE.Mesh(new THREE.SphereGeometry(0.028,14,14),\n  new THREE.MeshStandardMaterial({color:'#08131f',emissive:'#0c1a2a',emissiveIntensity:0.2,roughness:0.5}));\nemblem.position.set(0.14,0.42,0.006); flag.add(emblem);\nflag.scale.y=0.001;\n\nconst START=new THREE.Vector3(-7.2,3.6,3.0);\nconst HOVER=new THREE.Vector3(0,2.55,0.05);\nconst OUT=new THREE.Vector3(7.4,3.9,-3.2);\nconst UNDER=new THREE.Vector3(0,2.18,0.05);\nconst LAND=new THREE.Vector3(0,1.0,0.14);\nconst smoother=x=>{x=Math.min(1,Math.max(0,x));return x*x*x*(x*(x*6-15)+10);};\nconst seg=(a,b,t)=>smoother((t-a)/(b-a));\nconst win=(t,a,b,f)=>{if(t<a||t>b)return 0;return Math.min(1,(t-a)/f,(b-t)/f);};\nlet flagRaise=0;\nconst _u=new THREE.Vector3();\nfunction updateUfo(now,dt){\n  const C=30, lt=dt%C;\n  // UFO flight\n  if(lt<5){ ufo.position.lerpVectors(START,HOVER,seg(0,5,lt)); }\n  else if(lt<23){ ufo.position.copy(HOVER); ufo.position.y+=Math.sin(lt*1.6)*0.05; }\n  else { ufo.position.lerpVectors(HOVER,OUT,seg(23,28,lt)); }\n  ufo.rotation.y+=0.035;\n  ufoLights.forEach((L,i)=>{ L.material.emissiveIntensity=1.1+Math.sin(now*0.007+i*0.8)*0.9; });\n  dome.material.emissiveIntensity=1.4+Math.sin(now*0.004)*0.4;\n\n  // tractor beam (down 5.5–11, up 19.5–23.5)\n  const bAmt=Math.max(win(lt,5.5,11,1.2),win(lt,19.5,23.5,1.2));\n  if(bAmt>0.01){\n    beam2.visible=true;\n    const topY=ufo.position.y-0.12, len=Math.max(0.1,topY-LAND.y);\n    beam2.position.set(HOVER.x,(topY+LAND.y)/2,HOVER.z);\n    beam2.scale.y=len; beam2.material.opacity=0.28*bAmt;\n  } else beam2.visible=false;\n\n  // Alien descend / hold / ascend\n  const aVis=lt>=6.3&&lt<=23.2; alien.visible=aVis;\n  if(aVis){\n    if(lt<10.5){ alien.position.lerpVectors(UNDER,LAND,seg(6.3,10.5,lt)); }\n    else if(lt<20){ alien.position.copy(LAND); alien.position.y+=Math.sin(now*0.003)*0.006; }\n    else { alien.position.lerpVectors(LAND,UNDER,seg(20,23,lt)); }\n    alien.rotation.y=Math.sin(now*0.001)*0.4;\n  }\n\n  // Flag plant 12–15, permanent afterwards\n  flagRaise=Math.max(flagRaise,seg(12,15,lt));\n  flag.scale.y=0.001+flagRaise;\n  cloth.rotation.y=Math.sin(now*0.004)*0.25*flagRaise; // gentle wave\n}\n// point light at lantern\nconst beam=new THREE.PointLight('#ffd37a',3.2,6,2); beam.position.y=1.06; light.add(beam);\n// rotating beam cones (two opposite)\nconst beamMat=new THREE.MeshBasicMaterial({color:'#ffd37a',transparent:true,opacity:0.14,\n  blending:THREE.AdditiveBlending,depthWrite:false,fog:false,side:THREE.DoubleSide});\nconst beamPivot=new THREE.Group(); beamPivot.position.y=1.06; light.add(beamPivot);\nfor(let s=0;s<2;s++){\n  const cone=new THREE.Mesh(new THREE.ConeGeometry(0.34,2.6,20,1,true),beamMat);\n  cone.rotation.z=Math.PI/2; cone.position.x=(s?-1:1)*1.3; cone.rotation.y=s?Math.PI:0;\n  beamPivot.add(cone);\n}\n\n/* ---------- orbiting service nodes ---------- */\nconst nodeGroup=new THREE.Group(); scene.add(nodeGroup);\nconst ORB_R=5.1, ORB_TILT=0.34;\nnodeGroup.rotation.x=ORB_TILT;\nnodeGroup.position.y=0.35;\nconst nodes=[];\nconst raycastTargets=[];\nSERVICES.forEach((sv,i)=>{\n  const g=new THREE.Group();\n  const col=new THREE.Color(sv.color);\n  // glowing core\n  const core=new THREE.Mesh(new THREE.IcosahedronGeometry(0.34,1),\n    new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.55,\n      roughness:0.25,metalness:0.4,flatShading:true}));\n  g.add(core);\n  // wire shell\n  const shell=new THREE.Mesh(new THREE.IcosahedronGeometry(0.52,1),\n    new THREE.MeshBasicMaterial({color:col,wireframe:true,transparent:true,opacity:0.35}));\n  g.add(shell);\n  // halo ring\n  const halo=new THREE.Mesh(new THREE.TorusGeometry(0.62,0.015,8,40),\n    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5}));\n  halo.rotation.x=Math.PI/2.3; g.add(halo);\n  // invisible hit sphere\n  const hit=new THREE.Mesh(new THREE.SphereGeometry(0.72,8,8),\n    new THREE.MeshBasicMaterial({visible:false}));\n  hit.userData={index:i}; g.add(hit); raycastTargets.push(hit);\n  g.scale.setScalar(0.001);\n  nodeGroup.add(g);\n  const ang=(i/SERVICES.length)*Math.PI*2;\n  nodes.push({grp:g,core,shell,halo,ang,bob:Math.random()*6,color:sv.color,index:i,hover:false});\n});\n\n/* ---------- HTML labels ---------- */\nconst labelLayer=document.getElementById('labels');\nnodes.forEach((nd,i)=>{\n  const el=document.createElement('div'); el.className='nlabel';\n  el.innerHTML=`<span class=\"swatch\" style=\"background:${SERVICES[i].color};box-shadow:0 0 8px ${SERVICES[i].color}\"><\u002Fspan>${SERVICES[i].name}`;\n  el.addEventListener('click',()=>openPanel(i));\n  el.addEventListener('pointerenter',()=>setHover(i,true));\n  el.addEventListener('pointerleave',()=>setHover(i,false));\n  labelLayer.appendChild(el);\n  nd.label=el;\n});\n\n/* markets legend */\nconst mkWrap=document.getElementById('markets');\nMARKETS.forEach(mk=>{\n  const row=document.createElement('div'); row.className='row'+(mk.hq?' hq':'');\n  row.innerHTML=`<span class=\"dot\"><\u002Fspan><b>${mk.name}<\u002Fb>&nbsp;· ${mk.note}`;\n  mkWrap.appendChild(row);\n});\n\n/* ---------- interaction ---------- */\nconst ray=new THREE.Raycaster();\nconst mouse=new THREE.Vector2(); let mx=0,my=0, hoverIndex=-1;\nconst tip=document.getElementById('tip');\nfunction setHover(i,state){\n  const nd=nodes[i]; if(!nd) return; nd.hover=state;\n  if(state){ hoverIndex=i; document.body.style.cursor='pointer';\n    tip.textContent=SERVICES[i].name; tip.style.opacity='1'; }\n}\naddEventListener('pointermove',e=>{\n  mx=e.clientX; my=e.clientY;\n  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;\n  tip.style.left=mx+'px'; tip.style.top=my+'px';\n});\nrenderer.domElement.addEventListener('pointerdown',e=>{\n  ray.setFromCamera(mouse,camera);\n  const hit=ray.intersectObjects(raycastTargets,false)[0];\n  if(hit) openPanel(hit.object.userData.index);\n});\nfunction updateHover(){\n  ray.setFromCamera(mouse,camera);\n  const hit=ray.intersectObjects(raycastTargets,false)[0];\n  const idx=hit?hit.object.userData.index:-1;\n  if(idx!==hoverIndex){\n    if(hoverIndex>=0) nodes[hoverIndex].hover=false;\n    hoverIndex=idx;\n    if(idx>=0){ nodes[idx].hover=true; document.body.style.cursor='pointer';\n      tip.textContent=SERVICES[idx].name; tip.style.opacity='1'; }\n    else { document.body.style.cursor='default'; tip.style.opacity='0'; }\n  }\n}\n\n/* ---------- detail panel ---------- */\nconst panel=document.getElementById('panel');\nfunction openPanel(i){\n  const sv=SERVICES[i], col=sv.color;\n  document.getElementById('p-kicker').textContent=sv.kicker;\n  document.getElementById('p-title').textContent=sv.name;\n  document.getElementById('p-desc').textContent=sv.desc;\n  panel.querySelector('.accent').style.background=col;\n  document.getElementById('p-title').style.color='#fff';\n  const cta=document.getElementById('p-cta'); cta.style.background=col;\n  const ul=document.getElementById('p-list'); ul.innerHTML='';\n  sv.points.forEach(pt=>{\n    const li=document.createElement('li');\n    li.innerHTML=`<span class=\"chk\" style=\"background:${col}\">✓<\u002Fspan><span>${pt}<\u002Fspan>`;\n    ul.appendChild(li);\n  });\n  panel.classList.add('open');\n  focusIndex=i;\n}\nlet focusIndex=-1;\npanel.querySelector('.close').addEventListener('click',()=>{panel.classList.remove('open');focusIndex=-1;});\naddEventListener('keydown',e=>{if(e.key==='Escape'){panel.classList.remove('open');focusIndex=-1;}});\n\n/* ---------- intro / burst timing ---------- */\nlet t0=performance.now(), burst=0;\nconst introBar=document.getElementById('introbar'), introEl=document.getElementById('intro');\nsetTimeout(()=>{ introEl.classList.add('gone'); }, 1500);\n\n/* ---------- render loop ---------- */\nconst tmp=new THREE.Vector3();\nfunction frame(){\n  requestAnimationFrame(frame);\n  const now=performance.now(), dt=(now-t0)/1000;\n  const rdt=Math.min(0.05,(now-(frame._last||now))/1000); frame._last=now;\n  updateBackground(now,rdt);\n\n  // burst reveal (0 → 1 over 1.6s, ease-out)\n  if(burst<1){\n    burst=Math.min(1,dt/1.6);\n    const e=1-Math.pow(1-burst,3);\n    for(let i=0;i<DN;i++){\n      dotPos[i*3]  =dotStart[i*3]  +(dotTarget[i*3]  -dotStart[i*3])*e;\n      dotPos[i*3+1]=dotStart[i*3+1]+(dotTarget[i*3+1]-dotStart[i*3+1])*e;\n      dotPos[i*3+2]=dotStart[i*3+2]+(dotTarget[i*3+2]-dotStart[i*3+2])*e;\n    }\n    dotGeo.attributes.position.needsUpdate=true;\n    introBar.style.width=(e*100)+'%';\n  }\n\n  // gentle globe spin\n  globe.rotation.y += 0.0012;\n\n  // lighthouse beam sweep\n  beamPivot.rotation.y += 0.018;\n  lantern.material.emissiveIntensity = 2.0 + Math.sin(now*0.004)*0.6;\n  updateWaves(now,rdt);\n  updateUfo(now,dt);\n\n  // pins pulse\n  pins.forEach(p=>{\n    const s=1+((now*0.001+p.phase)%1); // 1→2 loop\n    p.ring.scale.setScalar(s);\n    p.ring.material.opacity=Math.max(0,0.6*(1-(s-1)));\n    if(p.arc){\n      const u=((now*0.00016+p.arc.off)%1);\n      p.arc.curve.getPoint(u,tmp); p.arc.trav.position.copy(tmp);\n    }\n  });\n\n  // orbit service nodes\n  const appear=Math.min(1,Math.max(0,(dt-0.8)/1.2));\n  nodeGroup.rotation.y += 0.0016;\n  nodes.forEach((nd,i)=>{\n    const a=nd.ang;\n    const x=Math.cos(a)*ORB_R, z=Math.sin(a)*ORB_R;\n    const y=Math.sin(now*0.0008+nd.bob)*0.35;\n    nd.grp.position.set(x,y,z);\n    nd.core.rotation.y+=0.01; nd.core.rotation.x+=0.006;\n    nd.shell.rotation.y-=0.006; nd.halo.rotation.z+=0.01;\n    const target=(nd.hover?1.32:1.0)*appear;\n    const cur=nd.grp.scale.x;\n    nd.grp.scale.setScalar(cur+(target-cur)*0.15);\n    nd.core.material.emissiveIntensity += ((nd.hover?1.3:0.55)-nd.core.material.emissiveIntensity)*0.12;\n    nd.halo.material.opacity += ((nd.hover?0.9:0.5)-nd.halo.material.opacity)*0.12;\n\n    // project label to screen\n    nd.grp.getWorldPosition(tmp); tmp.y+=0.85; tmp.project(camera);\n    const vis = tmp.z<1 && appear>0.4;\n    if(vis){\n      const sx=(tmp.x*0.5+0.5)*innerWidth, sy=(-tmp.y*0.5+0.5)*innerHeight;\n      nd.label.style.left=sx+'px'; nd.label.style.top=sy+'px';\n      nd.label.style.opacity=nd.hover?1:0.82;\n    } else nd.label.style.opacity=0;\n  });\n\n  if(burst>=1) updateHover();\n  controls.update();\n  renderer.render(scene,camera);\n}\nframe();\n\naddEventListener('resize',()=>{\n  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();\n  renderer.setSize(innerWidth,innerHeight);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
<script>
/* Bare mode: when this scene is embedded as the homepage hero backdrop (inside an
   iframe) hide its own wordmark, tagline and interaction hints, so the real HTML
   hero copy in index.html is the only headline. Opened directly, it stays intact.
   Re-applied on an interval because the bundle rewrites the document on unpack. */
(function(){
  var embedded = (window.self !== window.top);
  function apply(){
    if (embedded) {
      // hero backdrop: strip this page's own wordmark/tagline/hints
      if (document.getElementById('mnr-bare-mode')) return;
      var s = document.createElement('style');
      s.id = 'mnr-bare-mode';
      // #intro is this page's loading screen ("Charting the harbour") — behind the
      // hero copy it would just read as stray text while Three.js downloads.
      s.textContent = '.mark,.tag,.hud,.foot,#intro{display:none !important}';
      (document.head || document.documentElement).appendChild(s);
    } else {
      // opened as its own page: keep every feature, just add a way back
      if (document.getElementById('mnr-back')) return;
      if (!document.body) return;
      var a = document.createElement('a');
      a.id = 'mnr-back';
      a.href = 'index.html';
      a.textContent = '← Manara';
      // bottom-left on purpose: the panel's ✕ owns the top-right corner and the
      // MANARA wordmark owns the top-left, so this is the one corner that is free
      a.style.cssText = 'position:fixed;bottom:18px;left:18px;z-index:99999;' +
        'font-family:Archivo,system-ui,sans-serif;font-size:12.5px;font-weight:600;' +
        'letter-spacing:.12em;text-transform:uppercase;text-decoration:none;' +
        'color:#E6CC8C;border:1px solid rgba(230,204,140,.45);border-radius:999px;' +
        'padding:8px 16px;background:rgba(12,26,42,.72);backdrop-filter:blur(8px)';
      document.body.appendChild(a);
    }
  }
  apply();
  document.addEventListener('DOMContentLoaded', apply);
  setInterval(apply, 400);

  /* ---- Route each node's "Book a discovery call" to that service's own page ----
     The scene ships one hardcoded CTA (the homepage) for every node. We read the
     open panel's title and point the CTA at the matching page instead. Web Design
     has no page of its own, so it (and anything unrecognised) goes to the
     consultation form. Re-applied on an interval because the scene rewrites the
     panel each time a different node is opened. */
  function destFor(s){
    if (s.indexOf('ai agent') > -1)                          return 'ai-consulting.html';
    if (s.indexOf('linkedin') > -1)                          return 'linkedin-management.html';
    if (s.indexOf('social') > -1 || s.indexOf('content') > -1) return 'content-studio.html';
    if (s.indexOf('hr') > -1 || s.indexOf('talent') > -1)    return 'hr-consulting.html';
    if (s.indexOf('tender') > -1 || s.indexOf('bid') > -1)   return 'tender.html';
    if (s.indexOf('career') > -1)                            return 'career-consulting.html';
    return 'consultation.html';   // Web Design + fallback -> book a consultation
  }
  function routeCta(){
    var t = document.getElementById('p-title');
    var c = document.getElementById('p-cta');
    if (!t || !c) return;
    var s = (t.textContent || '').trim().toLowerCase();
    if (!s || s === 'title') return;
    var dest = destFor(s);
    if (c.getAttribute('href') !== dest) {
      c.setAttribute('href', dest);
      c.removeAttribute('target');   // route back into the site in the same tab
      c.removeAttribute('rel');
    }
  }
  setInterval(routeCta, 200);

  /* ---- Make the service panel easy to escape ----
     On a phone the panel covers ~88% of the screen and its only exit was a 34px
     low-contrast ✕. Now: a bigger gold close button, tap-outside, the Escape key,
     and the browser Back button all return you to the model. */
  function panelEl(){ return document.getElementById('panel'); }
  function isOpen(){ var p = panelEl(); return !!(p && p.classList.contains('open')); }

  var pushed = false;
  function closePanel(fromPop){
    var p = panelEl();
    if (!p) return;
    var b = p.querySelector('button.close');
    if (b) b.click(); else p.classList.remove('open');
    // consume the history entry we added, so Back doesn't need a second press
    if (!fromPop && pushed) { pushed = false; try { history.back(); } catch (e) {} }
  }

  /* Styles go inline on the elements, NOT via a <style> tag. The bundle wipes head
     styles, so a re-injecting <style> churned the stylesheet every 500ms, which kept
     restarting the panel's slide-in transition and left it stuck off-screen. Inline
     properties survive that and cost nothing to re-assert. */
  var CLOSE_STYLE = {
    width: '44px', height: '44px', 'font-size': '21px', 'line-height': '1',
    color: '#E6CC8C', background: 'rgba(230,204,140,.14)',
    border: '1px solid rgba(230,204,140,.5)', 'border-radius': '999px',
    display: 'flex', 'align-items': 'center', 'justify-content': 'center',
    cursor: 'pointer'
  };
  function decoratePanel(){
    var p = panelEl();
    if (p) {
      var cb = p.querySelector('button.close');
      if (cb && cb.style.width !== '44px') {
        for (var k in CLOSE_STYLE) cb.style.setProperty(k, CLOSE_STYLE[k], 'important');
      }
    }
    // the "← MANARA" pill shares the top-right corner with the panel's ✕, so it
    // steps aside while a service is open and returns once the panel closes
    var back = document.getElementById('mnr-back');
    if (back) {
      if (isOpen()) back.style.setProperty('display', 'none', 'important');
      else if (back.style.display === 'none') back.style.removeProperty('display');
    }
  }
  setInterval(decoratePanel, 300);

  // Escape
  document.addEventListener('keydown', function (e) {
    if ((e.key === 'Escape' || e.keyCode === 27) && isOpen()) closePanel();
  });

  // tap/click anywhere outside the panel (the scene itself) closes it
  document.addEventListener('pointerdown', function (e) {
    if (!isOpen()) return;
    var p = panelEl();
    if (p && !p.contains(e.target)) closePanel();
  }, true);

  // browser Back returns to the model instead of leaving the page
  setInterval(function () {
    var open = isOpen();
    if (open && !pushed) {
      try { history.pushState({ mnrPanel: 1 }, ''); pushed = true; } catch (e) {}
    } else if (!open && pushed && !history.state) {
      pushed = false;
    }
  }, 200);
  window.addEventListener('popstate', function () {
    if (isOpen()) { pushed = false; closePanel(true); }
  });
})();
</script>
