document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a8667269-77d1-4be4-a37e-dc6e895ce556\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"739c49d4-8ba5-40b3-80f4-0166158a639c\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  .serif{font-family:'Cormorant Garamond',serif}\n  @page{size:letter;margin:0}\n  @media print{\n    .deskbg{background:#fff !important;padding:0 !important}\n    .noprint{display:none !important}\n    .sheet{box-shadow:none !important;margin:0 !important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"deskbg\" style=\"min-height:100vh;background:#0C1A2A;display:flex;flex-direction:column;align-items:center;gap:18px;padding:32px 16px;font-family:'Archivo',system-ui,sans-serif\">\n\n  <div class=\"noprint\" style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center\">\n    <button onclick=\"{{ doPrint }}\" style=\"cursor:pointer;font-family:'Archivo',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em;color:#0C1A2A;background:linear-gradient(180deg,#E6CC8C,#C7A14E);border:none;border-radius:999px;padding:13px 26px;display:inline-flex;align-items:center;gap:9px\">\n      <svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"#0C1A2A\" stroke-width=\"1.8\"><path d=\"M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M6 14h12v7H6z\"><\u002Fpath><\u002Fsvg>\n      Save as PDF\n    <\u002Fbutton>\n    <span style=\"font-size:12.5px;color:#8C99A8;max-width:340px\">In the print dialog choose <b style=\"color:#CBBA98\">Save as PDF<\u002Fb>, then attach it to WhatsApp or email.<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- EMAIL AUTO-SEND -->\n  <div class=\"noprint\" style=\"width:816px;max-width:100%;background:rgba(12,26,42,.7);border:1px solid rgba(230,204,140,.28);border-radius:18px;padding:20px 22px;display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px\">\n    <div style=\"flex:1;min-width:180px\">\n      <label style=\"display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8C99A8;margin-bottom:7px\">Your name<\u002Flabel>\n      <input value=\"{{ cName }}\" oninput=\"{{ onName }}\" placeholder=\"Full name\" style=\"width:100%;box-sizing:border-box;font-family:'Archivo',sans-serif;font-size:14px;color:#F4EEE1;background:rgba(6,13,22,.6);border:1px solid rgba(244,238,225,.2);border-radius:10px;padding:12px 14px;outline:none\">\n    <\u002Fdiv>\n    <div style=\"flex:1;min-width:180px\">\n      <label style=\"display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8C99A8;margin-bottom:7px\">Your email <span style=\"text-transform:none;letter-spacing:0;color:#6B7684\">(for your copy)<\u002Fspan><\u002Flabel>\n      <input value=\"{{ cEmail }}\" oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"you@email.com\" style=\"width:100%;box-sizing:border-box;font-family:'Archivo',sans-serif;font-size:14px;color:#F4EEE1;background:rgba(6,13,22,.6);border:1px solid rgba(244,238,225,.2);border-radius:10px;padding:12px 14px;outline:none\">\n    <\u002Fdiv>\n    <button onclick=\"{{ sendEmail }}\" disabled=\"{{ sending }}\" style=\"cursor:pointer;font-family:'Archivo',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em;color:#0C1A2A;background:{{ sendBtnBg }};border:none;border-radius:999px;padding:13px 24px;display:inline-flex;align-items:center;gap:9px;white-space:nowrap\">\n      <svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"#0C1A2A\" stroke-width=\"1.8\"><path d=\"M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z\"><\u002Fpath><\u002Fsvg>\n      {{ sendLabel }}\n    <\u002Fbutton>\n    <div style=\"flex-basis:100%;font-size:12px;color:#8C99A8\">{{ sendNote }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- QUOTATION SHEET -->\n  <div class=\"sheet\" style=\"width:816px;max-width:100%;min-height:1056px;background:#0C1A2A;color:#F4EEE1;position:relative;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.5)\">\n\n    <!-- watermark lighthouse -->\n    <svg viewBox=\"0 0 40 40\" fill=\"none\" style=\"position:absolute;right:-70px;bottom:-40px;width:420px;height:420px;opacity:.05;pointer-events:none\"><path d=\"M20 3 L24 28 H16 Z\" fill=\"#E6CC8C\"><\u002Fpath><circle cx=\"20\" cy=\"8\" r=\"3.2\" fill=\"#E6CC8C\"><\u002Fcircle><rect x=\"13\" y=\"30\" width=\"14\" height=\"6\" rx=\"1.5\" fill=\"#E6CC8C\"><\u002Frect><\u002Fsvg>\n    <!-- faint horizon -->\n    <div style=\"position:absolute;left:0;right:0;top:0;height:220px;background:radial-gradient(120% 140% at 85% -10%,rgba(199,161,78,.16),transparent 60%);pointer-events:none\"><\u002Fdiv>\n\n    <!-- HEADER -->\n    <div style=\"position:relative;padding:44px 52px 28px;display:flex;justify-content:space-between;align-items:flex-start;gap:24px;border-bottom:1px solid rgba(244,238,225,.12)\">\n      <div style=\"display:flex;align-items:center;gap:13px\">\n        <svg viewBox=\"0 0 40 40\" fill=\"none\" style=\"width:38px;height:38px\"><path d=\"M20 3 L24 28 H16 Z\" fill=\"#C7A14E\"><\u002Fpath><circle cx=\"20\" cy=\"8\" r=\"3.2\" fill=\"#E6CC8C\"><\u002Fcircle><rect x=\"13\" y=\"30\" width=\"14\" height=\"6\" rx=\"1.5\" fill=\"#C7A14E\"><\u002Frect><\u002Fsvg>\n        <div>\n          <div class=\"serif\" style=\"font-size:32px;font-weight:600;line-height:1;letter-spacing:.01em\">Manara<\u002Fdiv>\n          <div style=\"font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:#CBBA98;margin-top:5px\">Consultancy<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right\">\n        <div class=\"serif\" style=\"font-size:30px;font-weight:600;color:#E6CC8C;line-height:1\">Quotation<\u002Fdiv>\n        <div style=\"font-size:12px;color:#CBBA98;margin-top:8px\">No. <span style=\"color:#F4EEE1\">{{ quoteNo }}<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:12px;color:#CBBA98;margin-top:3px\">Date <span style=\"color:#F4EEE1\">{{ dateStr }}<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:12px;color:#CBBA98;margin-top:3px\">Valid until <span style=\"color:#F4EEE1\">{{ validStr }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- META ROW -->\n    <div style=\"position:relative;padding:24px 52px;display:flex;gap:40px;border-bottom:1px solid rgba(244,238,225,.08)\">\n      <div style=\"flex:1\">\n        <div style=\"font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#8C99A8\">Prepared for<\u002Fdiv>\n        <div class=\"serif\" style=\"font-size:19px;color:#F4EEE1;margin-top:6px\">{{ clientName }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1\">\n        <div style=\"font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#8C99A8\">Engagement<\u002Fdiv>\n        <div class=\"serif\" style=\"font-size:19px;color:#F4EEE1;margin-top:6px\">{{ tierLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LINE ITEMS -->\n    <div style=\"position:relative;padding:12px 52px 0\">\n      <div style=\"display:flex;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#8C99A8;padding:14px 0 10px;border-bottom:1px solid rgba(244,238,225,.14)\">\n        <div style=\"flex:1\">Service<\u002Fdiv>\n        <div style=\"width:150px\">Basis<\u002Fdiv>\n        <div style=\"width:120px;text-align:right\">Investment<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ items }}\" as=\"it\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;align-items:baseline;padding:15px 0;border-bottom:1px solid rgba(244,238,225,.07)\">\n          <div style=\"flex:1;padding-right:16px\">\n            <div class=\"serif\" style=\"font-size:17.5px;color:#F4EEE1;line-height:1.15\">{{ it.title }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#9AA7B4;margin-top:3px\">{{ it.cat }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:150px;font-size:12.5px;color:#CBBA98\">{{ it.unit }}<\u002Fdiv>\n          <div style=\"width:120px;text-align:right;font-size:15px;font-weight:600;color:#E6CC8C\">{{ it.price }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- TOTAL -->\n    <div style=\"position:relative;padding:22px 52px 0;display:flex;justify-content:flex-end\">\n      <div style=\"width:330px\">\n        <div style=\"display:flex;justify-content:space-between;font-size:13px;color:#CBBA98;padding:6px 0\"><span>{{ countLabel }}<\u002Fspan><span>{{ totalText }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;padding:16px 20px;border-radius:14px;background:linear-gradient(180deg,rgba(199,161,78,.18),rgba(199,161,78,.07));border:1px solid rgba(230,204,140,.45)\">\n          <span style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#E6CC8C;font-weight:600\">Estimated total<\u002Fspan>\n          <span class=\"serif\" style=\"font-size:30px;font-weight:700;color:#F4EEE1;line-height:1\">{{ totalText }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NOTES -->\n    <div style=\"position:relative;padding:26px 52px 0;display:flex;gap:26px\">\n      <div style=\"flex:1\">\n        <div style=\"font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#8C99A8\">Terms<\u002Fdiv>\n        <div style=\"font-size:11.8px;line-height:1.55;color:#B9C3CE;margin-top:8px\">This is an indicative estimate. Final scope, timeline and pricing are confirmed after we review your brief. Prices are starting rates and may vary with complexity and duration.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1\">\n        <div style=\"font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#8C99A8\">Secure payment<\u002Fdiv>\n        <div style=\"font-size:11.8px;line-height:1.55;color:#B9C3CE;margin-top:8px\">Whish · OMT · Western Union. A secure payment request is shared only after your consultation is confirmed. NDAs available on request.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FOOTER -->\n    <div style=\"position:absolute;left:0;right:0;bottom:0;padding:22px 52px;border-top:1px solid rgba(244,238,225,.12);display:flex;justify-content:space-between;align-items:center;gap:20px;background:linear-gradient(180deg,transparent,rgba(6,13,22,.6))\">\n      <div>\n        <div class=\"serif\" style=\"font-size:16px;color:#E6CC8C;font-style:italic\">A fixed point in changing waters.<\u002Fdiv>\n        <div style=\"font-size:12px;color:#CBBA98;margin-top:6px;letter-spacing:.04em\">manaraconsultancy.online<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right;font-size:12px;color:#B9C3CE;line-height:1.7\">\n        <div>{{ phone }}<\u002Fdiv>\n        <div>{{ email }}<\u002Fdiv>\n        <div style=\"color:#8C99A8\">Beirut · UK · US · Canada · Dubai<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:880,&quot;height&quot;:1120}}\">\nclass Component extends DCLogic {\n  // ── Paste your free Web3Forms access key below (get one at web3forms.com — it\n  //    is emailed to you instantly; delivery goes to hello@manaraconsultancy.online).\n  WEB3FORMS_KEY = 'YOUR_WEB3FORMS_ACCESS_KEY';\n\n  state = { data: null, cName: '', cEmail: '', sendState: 'idle' };\n  componentDidMount(){\n    let d = null;\n    try { d = JSON.parse(localStorage.getItem('manara_quote') || 'null'); } catch(e){}\n    this._qno = 'MNR-' + new Date().getFullYear() + '-' + String(Math.floor(Date.now()/1000)).slice(-5);\n    this.setState({ data: d });\n    try { document.title = 'Manara Consultancy — Quotation'; } catch(e){}\n  }\n  _emailBody(q){\n    const lines = q.items.map(it => '• ' + it.title + '  (' + it.cat + ', ' + it.unit + ')  —  ' + it.price);\n    return [\n      'MANARA CONSULTANCY — QUOTATION',\n      'Quote no: ' + q.qno,\n      'Date: ' + q.dateStr + '   |   Valid until: ' + q.validStr,\n      'Engagement: ' + q.tier,\n      'Prepared for: ' + (this.state.cName || q.client),\n      this.state.cEmail ? 'Client email: ' + this.state.cEmail : '',\n      '',\n      'SCOPE',\n      ...lines,\n      '',\n      'Estimated total: ' + q.total,\n      '',\n      'Terms: indicative estimate; final scope confirmed after brief review.',\n      'manaraconsultancy.online · +961 76 952 134 · hello@manaraconsultancy.online'\n    ].filter(Boolean).join('\\n');\n  }\n  NETLIFY_FN = 'https://manara-quote.mya-moubarak.workers.dev/';\n\n  async _makePdf(){\n    if (typeof html2pdf === 'undefined') return null;\n    const el = document.querySelector('.sheet');\n    if (!el) return null;\n    const opt = {\n      margin: 0,\n      image: { type: 'jpeg', quality: 0.96 },\n      html2canvas: { scale: 2, backgroundColor: '#0C1A2A', useCORS: true },\n      jsPDF: { unit: 'px', format: [816, el.scrollHeight || 1056], orientation: 'portrait' }\n    };\n    try {\n      const uri = await html2pdf().set(opt).from(el).outputPdf('datauristring');\n      if (!uri) return null;\n      // Normalise to raw base64 (data-URIs can include a ;filename= param).\n      return uri.indexOf('base64,') >= 0 ? uri.substring(uri.indexOf('base64,') + 7) : uri;\n    } catch(e){ return null; }\n  }\n  _mailtoFallback(q){\n    const subject = 'Quotation ' + q.qno + ' — ' + (this.state.cName || q.client);\n    const body = this._emailBody(q);\n    const href = 'mailto:hello@manaraconsultancy.online'\n      + '?subject=' + encodeURIComponent(subject)\n      + (this.state.cEmail ? '&cc=' + encodeURIComponent(this.state.cEmail) : '')\n      + '&body=' + encodeURIComponent(body);\n    try { window.location.href = href; } catch(e){}\n    this.setState({ sendState: 'mailto' });\n  }\n  async _send(){\n    if (this.state.sendState === 'sending') return;\n    const q = this._quote();\n    this.setState({ sendState: 'sending' });\n\n    // Preferred path: generate the PDF and email it (attached) via the Netlify function.\n    this._diag = '';\n    try {\n      const pdf = await this._makePdf();\n      if (!pdf) { this._diag = 'PDF could not be generated on this device.'; }\n      else {\n        const r = await fetch(this.NETLIFY_FN, {\n          method: 'POST',\n          headers: { 'Content-Type': 'application/json' },\n          body: JSON.stringify({\n            filename: 'Manara-Quotation-' + q.qno + '.pdf',\n            pdfBase64: pdf,\n            clientName: this.state.cName || q.client,\n            clientEmail: this.state.cEmail || '',\n            subject: 'Quotation ' + q.qno + ' — ' + (this.state.cName || q.client),\n            bodyText: this._emailBody(q)\n          })\n        });\n        const txt = await r.text().catch(() => '');\n        if (r.ok) {\n          let j = {}; try { j = JSON.parse(txt); } catch(e){}\n          if (j && j.success) { this.setState({ sendState: 'sent' }); return; }\n          this._diag = 'Sender said: ' + (txt || 'unknown').slice(0, 200);\n        } else {\n          this._diag = 'HTTP ' + r.status + ' — ' + (txt || '').slice(0, 200);\n        }\n      }\n    } catch(e){ this._diag = 'Network/CORS error: ' + (e && e.message || e); }\n\n    // Fallback A: silent send via Web3Forms if a key is configured.\n    const key = this.WEB3FORMS_KEY;\n    if (key && key !== 'YOUR_WEB3FORMS_ACCESS_KEY') {\n      try {\n      const payload = {\n        access_key: key,\n        subject: 'New quotation ' + q.qno + ' — ' + (this.state.cName || q.client),\n        from_name: 'Manara Quote Builder',\n        // Web3Forms Autoresponder replies to this address — the client's copy:\n        email: this.state.cEmail || 'hello@manaraconsultancy.online',\n        replyto: this.state.cEmail || 'hello@manaraconsultancy.online',\n        client_name: this.state.cName || q.client,\n        client_email: this.state.cEmail || '(not provided)',\n        quote_no: q.qno,\n        engagement: q.tier,\n        total: q.total,\n        message: this._emailBody(q)\n      };\n      const r = await fetch('https://api.web3forms.com/submit', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n        body: JSON.stringify(payload)\n      });\n      const j = await r.json();\n      if (j && j.success) { this.setState({ sendState: 'sent' }); return; }\n      } catch(e) { /* fall through */ }\n    }\n    // No silent mail-app redirect — surface the real reason so it can be fixed.\n    this.setState({ sendState: 'error' });\n  }\n  _quote(){\n    const d = this.state.data || this._fallback();\n    const now = new Date();\n    const valid = new Date(now.getTime() + 30*864e5);\n    const fmtD = (x) => x.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });\n    const items = (d.items && d.items.length ? d.items : this._fallback().items);\n    return {\n      qno: this._qno || ('MNR-' + now.getFullYear()),\n      dateStr: d.dateStr || fmtD(now),\n      validStr: fmtD(valid),\n      client: d.client || 'Prospective client',\n      tier: d.tier || 'Standard tier',\n      items: items,\n      total: d.totalText || 'from $0'\n    };\n  }\n  _fallback(){\n    return {\n      tier: 'Standard tier',\n      client: 'Prospective client',\n      items: [\n        { title: 'AI Strategy Consultation', cat: 'AI & Automation', unit: 'per engagement', price: 'from $150' },\n        { title: 'Social Content Calendar', cat: 'Marketing', unit: 'per month', price: 'from $300' },\n        { title: 'LinkedIn Profile Management', cat: 'Career', unit: 'per month', price: 'from $250' }\n      ],\n      totalText: 'from $700',\n      count: 3\n    };\n  }\n  renderVals(){\n    const q = this._quote();\n    const count = q.items.length;\n    const ss = this.state.sendState;\n    const sendLabel = ss === 'sending' ? 'Preparing PDF…'\n      : ss === 'sent' ? '✓ Quote sent'\n      : ss === 'error' ? 'Try again'\n      : ss === 'mailto' ? '✓ Opening your email…'\n      : 'Email quote (PDF attached)';\n    const sentMsg = this.state.cEmail\n      ? 'Sent to Manara with the PDF attached — and a copy is on its way to ' + this.state.cEmail + '.'\n      : 'Sent to Manara with the PDF attached — we will reply shortly.';\n    const noteMap = {\n      idle: 'Generates the PDF and emails it to Manara. Add your email to receive a copy too.',\n      sending: 'Building your quotation PDF and sending…',\n      sent: sentMsg,\n      error: 'Auto-send failed → ' + (this._diag || 'unknown reason') + '  ·  Meanwhile use “Save as PDF” and email it to hello@manaraconsultancy.online.',\n      mailto: 'Email delivery isn\\u2019t configured yet, so your mail app is opening with the quote ready to send. (Tip: also Save as PDF and attach it.)'\n    };\n    return {\n      quoteNo: q.qno,\n      dateStr: q.dateStr,\n      validStr: q.validStr,\n      clientName: this.state.cName || q.client,\n      tierLabel: q.tier,\n      items: q.items,\n      countLabel: count + (count === 1 ? ' service' : ' services'),\n      totalText: q.total,\n      phone: '+961 76 952 134',\n      email: 'hello@manaraconsultancy.online',\n      doPrint: () => { try { window.print(); } catch(e){} },\n      cName: this.state.cName,\n      cEmail: this.state.cEmail,\n      onName: (e) => this.setState({ cName: e.target.value, sendState: 'idle' }),\n      onEmail: (e) => this.setState({ cEmail: e.target.value, sendState: 'idle' }),\n      sendEmail: () => this._send(),\n      sendLabel: sendLabel,\n      sending: ss === 'sending',\n      sendNote: noteMap[ss] || noteMap.idle,\n      sendBtnBg: ss === 'sent' ? '#1f7a4d' : 'linear-gradient(180deg,#E6CC8C,#C7A14E)'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
