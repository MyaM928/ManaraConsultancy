document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

height:.9;font-variant-numeric:tabular-nums\">${{ qTotal }}<\u002Fdiv>\n      <\u002Fdiv>\n\n            <button onclick=\"{{ pdfThesis }}\" style=\"width:100%;margin-top:18px;box-sizing:border-box;cursor:pointer;font-family:'Archivo',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:9px;font-size:15px;font-weight:600;letter-spacing:.02em;padding:16px;border-radius:999px;background:#C7A14E;color:#0C1A2A;border:none;transition:transform .25s,box-shadow .25s\" style-hover=\"transform:translateY(-2px);box-shadow:0 14px 38px -12px rgba(199,161,78,.75)\">\n        <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"#0C1A2A\" stroke-width=\"1.8\"><path d=\"M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M6 14h12v7H6z\"><\u002Fpath><\u002Fsvg>\n        Send this quote by email\n      <\u002Fbutton>\n      <div style=\"font-size:12px;color:#8C99A8;margin-top:12px;text-align:center\">Estimate only. Final scope is confirmed after we review your brief.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid rgba(244,238,225,.1);background:rgba(9,18,32,.6)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:56px 28px 30px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px\" class=\"footgrid\">\n      <div>\n        <a href=\"index.html\" style=\"display:inline-flex;align-items:center;gap:10px;color:#F4EEE1\">\n          <svg viewBox=\"0 0 40 40\" fill=\"none\" style=\"width:22px;height:22px\"><path d=\"M20 3 L24 28 H16 Z\" fill=\"#C7A14E\"><\u002Fpath><circle cx=\"20\" cy=\"8\" r=\"3.2\" fill=\"#E6CC8C\"><\u002Fcircle><rect x=\"13\" y=\"30\" width=\"14\" height=\"6\" rx=\"1.5\" fill=\"#C7A14E\"><\u002Frect><\u002Fsvg>\n          <span class=\"serifish\" style=\"font-size:23px;font-weight:600\">Manara<\u002Fspan>\n        <\u002Fa>\n        <p style=\"color:#CBBA98;font-size:14px;margin-top:18px;max-width:38ch\">An advisory house for companies, individuals and scholars across Lebanon, the UK, the US, Canada and Dubai.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h5 style=\"font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#C7A14E;margin:0 0 18px;font-weight:600\">Practice<\u002Fh5>\n        <a href=\"business-consulting.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Business Consulting<\u002Fa>\n        <a href=\"ai-consulting.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">AI Consulting &amp; Agents<\u002Fa>\n        <a href=\"startup-consulting.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Startup Consultancy<\u002Fa>\n        <a href=\"content-calendar.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Content Calendar<\u002Fa>\n        <a href=\"linkedin-management.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">LinkedIn Management<\u002Fa>\n        <a href=\"career-consulting.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Career Coaching<\u002Fa>\n        <a href=\"thesis-support.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Thesis Support<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h5 style=\"font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#C7A14E;margin:0 0 18px;font-weight:600\">House<\u002Fh5>\n        <a href=\"index.html#approach\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Approach<\u002Fa>\n        <a href=\"index.html#regions\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Regions<\u002Fa>\n        <a href=\"blog.html\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Insights Blog<\u002Fa>\n        <a href=\"index.html#contact\" style=\"display:block;color:#EBE2CF;font-size:14px;padding:6px 0\" style-hover=\"color:#E6CC8C\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;padding:22px 28px 40px;border-top:1px solid rgba(244,238,225,.08);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;color:#8C99A8;font-size:13px\">\n      <span>© 2026 Manara Consultancy. All rights reserved.<\u002Fspan>\n      <span>Beirut · London · New York · Toronto · Dubai<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:820},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#C7A14E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;defaultTier&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;standard&quot;,&quot;options&quot;:[&quot;standard&quot;,&quot;premium&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.CATS = [\n      {k:'all', label:'All Services'},\n      {k:'ai', label:'AI & Automation'},\n      {k:'biz', label:'Business & Strategy'},\n      {k:'content', label:'Content & Social'},\n      {k:'career', label:'Career & HR'},\n      {k:'academic', label:'Academic'}\n    ];\n    this.CATLABEL = {ai:'AI & Automation', biz:'Business & Strategy', content:'Content & Social', career:'Career & HR', academic:'Academic'};\n    this.SERVICES = [\n      {id:'ai1', cat:'ai', title:'AI Strategy Consultation', desc:'A 60–90 minute working session mapping exactly where AI fits your operation.', std:150, prm:275, unit:'one-off'},\n      {id:'ai2', cat:'ai', title:'AI Agent Design', desc:'The full conversational blueprint and planning before a single line is built.', std:300, prm:550, unit:'project'},\n      {id:'ai3', cat:'ai', title:'AI Agent Implementation', desc:'A live agent on WhatsApp and your website, trained on your own business.', std:700, prm:1250, unit:'project'},\n      {id:'ai4', cat:'ai', title:'AI Workflow Automation', desc:'Repetitive back-office tasks wired to run themselves, quietly.', std:500, prm:900, unit:'project'},\n      {id:'b1', cat:'biz', title:'Business Strategy Session', desc:'Growth, positioning, expansion and restructuring counsel.', std:150, prm:275, unit:'session'},\n      {id:'b2', cat:'biz', title:'Startup Consultancy', desc:'Validate the idea, model the business, define the market and the path.', std:200, prm:375, unit:'engagement'},\n      {id:'b3', cat:'biz', title:'Market Research Report', desc:'Clear evidence on your market, competitors and the real opportunity.', std:300, prm:550, unit:'report'},\n      {id:'b4', cat:'biz', title:'Marketing Strategy', desc:'Brand positioning, marketing plans, digital strategy and campaigns.', std:250, prm:450, unit:'project'},\n      {id:'c1', cat:'content', title:'Content Calendar', desc:'A full month of platform-matched posts, planned and written for you.', std:150, prm:300, unit:'/month'},\n      {id:'c2', cat:'content', title:'LinkedIn Management', desc:'Profile optimisation, networking strategy and professional branding.', std:250, prm:450, unit:'/month'},\n      {id:'cr1', cat:'career', title:'Career Coaching', desc:'Career planning, executive coaching and interview preparation.', std:100, prm:200, unit:'session'},\n      {id:'cr2', cat:'career', title:'CV / Resume Review', desc:'A sharper, recruiter-ready CV and clearer professional positioning.', std:50, prm:120, unit:'one-off'},\n      {id:'a1', cat:'academic', title:'Thesis Support', desc:'Supervision, methodology, drafting, proofreading and defence prep.', std:15, prm:25, unit:'/page'},\n      {id:'a2', cat:'academic', title:'SPSS / Data Analysis', desc:'Statistical analysis and a clear interpretation of your results.', std:150, prm:300, unit:'project'},\n      {id:'a3', cat:'academic', title:'Dissertation Consulting', desc:'End-to-end doctoral support across Europe, MENA and North America.', std:500, prm:900, unit:'engagement'}\n    ];\n    this.MAJORS = ['Business & Management','Economics & Finance','Marketing','Law','Political Science & IR','Engineering','Computer Science & IT','Medicine & Health Sciences','Public Health','Psychology','Education','Sociology & Anthropology','Architecture & Design','Literature & Languages','Environmental Science','Other / Interdisciplinary'];\n    this.DURS = [{rate:15,label:'3 months ahead'},{rate:22.5,label:'2 months ahead'},{rate:27.5,label:'1 month ahead'}];\n    const startTier = (this.props.defaultTier === 'premium') ? 'premium' : 'standard';\n    const disp = {};\n    this.SERVICES.forEach(s => { disp[s.id] = s[startTier === 'premium' ? 'prm' : 'std']; });\n    this.state = { tier: startTier, cat: 'all', added: {}, disp, qMajor: 0, qWords: 10000, qDur: 0 };\n  }\n  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); if(this._io) this._io.disconnect(); }\n  componentDidMount(){ this._observe(); }\n  componentDidUpdate(){ this._observe(); }\n  _observe(){\n    const root = this.rootRef.current; if(!root) return;\n    if(!this._io){\n      this._io = new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); this._io.unobserve(e.target); } }); }, {threshold:0.12});\n    }\n    root.querySelectorAll('[data-reveal]:not(.in)').forEach(el=>this._io.observe(el));\n    setTimeout(()=>{ root.querySelectorAll('[data-reveal]:not(.in)').forEach(el=>el.classList.add('in')); }, 700);\n  }\n  _accent(){ return this.props.accentColor || '#C7A14E'; }\n  _fmt(n){ return '$' + Math.round(n).toLocaleString('en-US'); }\n  _priceFor(s, tier){ return tier === 'premium' ? s.prm : s.std; }\n  _animateTo(target){\n    if(this._raf) cancelAnimationFrame(this._raf);\n    const from = Object.assign({}, this.state.disp);\n    const start = performance.now(); const dur = 520;\n    const step = (t)=>{\n      const p = Math.min(1, (t - start)/dur); const e = 1 - Math.pow(1 - p, 3);\n      const disp = {};\n      for(const k in target){ const a = (from[k] != null ? from[k] : target[k]); disp[k] = a + (target[k] - a) * e; }\n      this.setState({ disp });\n      if(p < 1) this._raf = requestAnimationFrame(step);\n    };\n    this._raf = requestAnimationFrame(step);\n  }\n  _setTier(tier){\n    if(tier === this.state.tier) return;\n    this.setState({ tier });\n    const target = {}; this.SERVICES.forEach(s => { target[s.id] = this._priceFor(s, tier); });\n    this._animateTo(target);\n  }\n  _waHref(){\n    const tier = this.state.tier;\n    const items = this.SERVICES.filter(s => this.state.added[s.id]);\n    let total = 0; items.forEach(s => { total += this._priceFor(s, tier); });\n    const lines = items.map(s => '• ' + s.title + ' — from ' + this._fmt(this._priceFor(s, tier)) + (s.unit && s.unit.charAt(0) === '/' ? ' ' + s.unit : ''));\n    let msg = 'Hi Manara, I would like to discuss this scope (' + (tier === 'premium' ? 'Premium' : 'Standard') + ' tier):\\n';\n    if(items.length){ msg += lines.join('\\n') + '\\n\\nIndicative total: from ' + this._fmt(total) + '.'; }\n    else { msg += 'I would like help choosing the right services for my needs.'; }\n    return 'https://api.whatsapp.com/send?phone=96176952134&text=' + encodeURIComponent(msg);\n  }\n  _num(n){ return (Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2}); }\n  _thesisWaHref(major, words, pages, dur, total){\n    const msg = 'Hi Manara, I would like a thesis & dissertation support quote:\\n'\n      + '• Field of study: ' + major + '\\n'\n      + '• Word count: ' + words + ' words (≈ ' + pages + ' pages at 250 words/page)\\n'\n      + '• Booking window: ' + dur.label + '\\n'\n      + '• Rate: $' + this._num(dur.rate) + ' / page\\n'\n      + '• Estimated total: $' + this._num(total) + '\\n\\n'\n      + 'Please confirm availability and next steps.';\n    return 'https://api.whatsapp.com/send?phone=96176952134&text=' + encodeURIComponent(msg);\n  }\n  renderVals(){\n    const accent = this._accent();\n    const tier = this.state.tier;\n    const activeCat = this.state.cat;\n\n    // thesis instant-quote calculator\n    const words = Math.max(0, this.state.qWords || 0);\n    const pages = Math.max(1, Math.ceil(words / 250));\n    const dur = this.DURS[this.state.qDur];\n    const thesisTotal = pages * dur.rate;\n    const dB = (i) => this.state.qDur === i ? accent : 'rgba(244,238,225,.22)';\n    const dBg = (i) => this.state.qDur === i ? 'rgba(199,161,78,.14)' : 'rgba(9,18,32,.4)';\n\n    const cats = this.CATS.map(c => {\n      const on = (c.k === activeCat);\n      return {\n        label: c.label,\n        on: () => this.setState({ cat: c.k }),\n        bg: on ? accent : 'transparent',\n        color: on ? '#0C1A2A' : '#CBBA98',\n        border: on ? accent : 'rgba(244,238,225,.24)'\n      };\n    });\n\n    const list = this.SERVICES.filter(s => activeCat === 'all' || s.cat === activeCat);\n    const cards = list.map(s => {\n      const added = !!this.state.added[s.id];\n      const isPrem = tier === 'premium';\n      return {\n        title: s.title, desc: s.desc, unit: s.unit,\n        catLabel: this.CATLABEL[s.cat],\n        priceText: this._fmt(this.state.disp[s.id] != null ? this.state.disp[s.id] : this._priceFor(s, tier)),\n        tierTag: isPrem ? '★ Premium' : 'Standard',\n        tierTagColor: isPrem ? '#E6CC8C' : '#8C99A8',\n        borderCol: added ? 'rgba(230,204,140,.6)' : 'rgba(244,238,225,.16)',\n        bgCol: added ? 'radial-gradient(120% 90% at 0% 0%,rgba(199,161,78,.14),transparent 55%),rgba(12,26,42,.6)' : 'rgba(12,26,42,.5)',\n        addLabel: added ? '✓ Added' : '+ Add to estimate',\n        addBg: added ? accent : 'transparent',\n        addColor: added ? '#0C1A2A' : '#F4EEE1',\n        addBorder: added ? accent : 'rgba(244,238,225,.3)',\n        toggleAdd: () => this.setState(st => { const a = Object.assign({}, st.added); if(a[s.id]) delete a[s.id]; else a[s.id] = true; return { added: a }; })\n      };\n    });\n\n    const selectedServices = this.SERVICES.filter(s => this.state.added[s.id]);\n    const selection = selectedServices.map(s => ({\n      title: s.title, catLabel: this.CATLABEL[s.cat], unit: s.unit,\n      priceText: this._fmt(this._priceFor(s, tier)),\n      remove: () => this.setState(st => { const a = Object.assign({}, st.added); delete a[s.id]; return { added: a }; })\n    }));\n    let total = 0; selectedServices.forEach(s => { total += this._priceFor(s, tier); });\n    const count = selectedServices.length;\n\n    return {\n      rootRef: this.rootRef,\n      setStd: () => this._setTier('standard'),\n      setPrm: () => this._setTier('premium'),\n      cats, cards, selection,\n      tierName: tier === 'premium' ? 'Premium' : 'Standard',\n      tierKnobLeft: tier === 'premium' ? '50%' : '5px',\n      stdColor: tier === 'premium' ? '#CBBA98' : '#0C1A2A',\n      prmColor: tier === 'premium' ? '#0C1A2A' : '#CBBA98',\n      tierNote: tier === 'premium'\n        ? 'Premium engagements are led personally by a senior consultant — priority 48-hour turnaround, extended revisions and a direct WhatsApp line throughout.'\n        : 'Standard engagements deliver the same rigour on a normal timeline. Switch to Premium for senior-led, priority delivery.',\n      hasSelection: count > 0,\n      noSelection: count === 0,\n      totalText: this._fmt(total),\n      countLabel: count === 0 ? 'Nothing selected yet' : count + (count === 1 ? ' service selected' : ' services selected'),\n      waHref: this._waHref(),\n      pdfQuote: () => {\n        const tierLabel = (tier === 'premium' ? 'Premium tier' : 'Standard tier');\n        const items = selection.map(s => ({ title: s.title, cat: s.catLabel, unit: s.unit, price: s.priceText }));\n        const payload = { tier: tierLabel, items: items, totalText: this._fmt(total), client: 'Prospective client', dateStr: new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) };\n        try { localStorage.setItem('manara_quote', JSON.stringify(payload)); } catch(e){}\n        try { window.open('quote.html','_blank'); } catch(e){}\n      },\n      clearAll: () => this.setState({ added: {} }),\n      // thesis instant-quote\n      majorOptions: this.MAJORS.map((m, i) => ({ name: m, idx: i })),\n      onMajor: (e) => this.setState({ qMajor: e.target.selectedIndex }),\n      onWords: (e) => { const v = parseInt((e.target.value || '').replace(/[^0-9]/g, ''), 10); this.setState({ qWords: isNaN(v) ? 0 : v }); },\n      qWordsVal: this.state.qWords,\n      qPages: pages,\n      setDur0: () => this.setState({ qDur: 0 }),\n      setDur1: () => this.setState({ qDur: 1 }),\n      setDur2: () => this.setState({ qDur: 2 }),\n      d0border: dB(0), d1border: dB(1), d2border: dB(2),\n      d0bg: dBg(0), d1bg: dBg(1), d2bg: dBg(2),\n      dur0rate: this._num(this.DURS[0].rate), dur1rate: this._num(this.DURS[1].rate), dur2rate: this._num(this.DURS[2].rate),\n      dur0lab: this.DURS[0].label, dur1lab: this.DURS[1].label, dur2lab: this.DURS[2].label,\n      qBreakdown: pages + ' pages × $' + this._num(dur.rate) + '/pg',\n      qTotal: this._num(thesisTotal),\n      thesisWaHref: this._thesisWaHref(this.MAJORS[this.state.qMajor] || this.MAJORS[0], words, pages, dur, thesisTotal),\n      pdfThesis: () => {\n        const major = this.MAJORS[this.state.qMajor] || this.MAJORS[0];\n        const payload = {\n          tier: 'Thesis & dissertation support',\n          client: 'Prospective scholar',\n          items: [{ title: 'Thesis & Dissertation Support — ' + major, cat: 'Booking window: ' + dur.label, unit: pages + ' pages × $' + this._num(dur.rate) + '/pg', price: '$' + this._num(thesisTotal) }],\n          totalText: '$' + this._num(thesisTotal),\n          dateStr: new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})\n        };\n        try { localStorage.setItem('manara_quote', JSON.stringify(payload)); } catch(e){}\n        try { window.open('quote.html','_blank'); } catch(e){}\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
