    // document mints the blobs for its OWN frames, obtaining page text

    // its direct parent (which, for every document the publisher's own

    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.

    const blobUrls = {};
    const resourceBlobs = {};

      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);

      // root's never-relay rule) are what hold in fully opaque chains

      // as real-vs-'null' rather than matching.

      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).

    document.documentElement.replaceWith(doc.documentElement);

    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.

      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });

        }
      }

        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }

    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');

      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

o\" style=\"display:flex;justify-content:space-between;font-size:10px;letter-spacing:.08em;color:rgba(244,238,225,.5);margin-top:8px\"><span>{{ b.metric }}<\u002Fspan><span style=\"color:{{ b.color }}\">{{ b.status }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- core web vitals -->\n    <div class=\"hud reveal\" style=\"margin-top:16px;padding:28px 30px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px\">\n        <div>\n          <h3 class=\"orb\" style=\"margin:0;font-weight:700;font-size:20px;letter-spacing:.04em\">VELOCITY CORE<\u002Fh3>\n          <div class=\"mono\" style=\"font-size:11px;color:rgba(244,238,225,.45);margin-top:3px\">FIELD METRICS · {{ formFactorLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ liveTest }}\" class=\"mono\" style=\"display:{{ liveBtnDisplay }};align-items:center;gap:8px;padding:11px 18px;border-radius:10px;background:linear-gradient(160deg,#E7B96B,#C9942F);color:#231703;border:none;font-size:12px;font-weight:700;letter-spacing:.08em;cursor:pointer\">▶ RUN LIVE FIELD TEST ↗<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"margin-top:20px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px\">\n        <sc-for list=\"{{ cwv }}\" as=\"v\" hint-placeholder-count=\"5\">\n          <div style=\"padding:18px 16px;border-radius:14px;background:rgba(5,8,14,.5);border:1px solid {{ v.color }}\">\n            <div class=\"mono\" style=\"font-size:11px;letter-spacing:.1em;color:rgba(244,238,225,.55)\">{{ v.key }}<\u002Fdiv>\n            <div class=\"orb\" style=\"font-weight:700;font-size:30px;margin-top:8px;color:{{ v.color }}\">{{ v.val }}<\u002Fdiv>\n            <div class=\"mono\" style=\"font-size:10px;letter-spacing:.08em;margin-top:6px;color:{{ v.color }}\">{{ v.tag }}<\u002Fdiv>\n            <div style=\"margin-top:8px;font-size:11px;color:rgba(244,238,225,.4)\">{{ v.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- lighthouse dials -->\n    <div style=\"margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px\">\n      <sc-for list=\"{{ dials }}\" as=\"d\" hint-placeholder-count=\"4\">\n        <div class=\"hud reveal\" style=\"padding:22px;display:flex;flex-direction:column;align-items:center;text-align:center\">\n          <div style=\"position:relative;width:118px;height:118px\">\n            <div style=\"position:absolute;inset:0;border-radius:50%;background:{{ d.gauge }}\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:11px;border-radius:50%;background:#0a1524;display:flex;align-items:center;justify-content:center\"><span class=\"orb\" style=\"font-weight:700;font-size:30px;color:{{ d.color }}\">{{ d.val }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:14px;font-weight:600;color:rgba(244,238,225,.82)\">{{ d.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- directives + social -->\n    <div style=\"margin-top:16px;display:grid;grid-template-columns:1.3fr 1fr;gap:16px\">\n      <div class=\"hud reveal\" style=\"padding:30px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <h3 class=\"orb\" style=\"margin:0;font-weight:700;font-size:20px;letter-spacing:.04em\">PRIORITY DIRECTIVES<\u002Fh3>\n          <span class=\"mono\" style=\"font-size:11px;color:#FF6B6B\">{{ findingCount }} FLAGGED<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ findings }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;gap:14px;padding:16px;border-radius:12px;background:rgba(5,8,14,.45);border-left:3px solid {{ f.sevColor }}\">\n              <span class=\"mono\" style=\"flex:none;padding:4px 9px;border-radius:6px;height:fit-content;background:{{ f.sevBg }};color:{{ f.sevColor }};font-size:10px;letter-spacing:.1em\">{{ f.sev }}<\u002Fspan>\n              <div><div style=\"font-weight:600;font-size:16px\">{{ f.title }}<\u002Fdiv><div style=\"margin-top:4px;font-size:14px;line-height:1.5;color:rgba(244,238,225,.6)\">{{ f.text }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"hud reveal\" style=\"padding:30px;border-color:rgba(143,211,255,.28)\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px\">\n          <div><h3 class=\"orb\" style=\"margin:0;font-weight:700;font-size:20px;letter-spacing:.04em\">SOCIAL GRAPH<\u002Fh3><div class=\"mono\" style=\"font-size:12px;color:#8FD3FF;margin-top:4px\">{{ socHandle }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:none;text-align:center;padding:8px 14px;border-radius:12px;background:rgba(5,8,14,.5);border:1px solid {{ socGradeColor }}\"><div class=\"orb\" style=\"font-weight:800;font-size:28px;line-height:1;color:{{ socGradeColor }}\">{{ socGrade }}<\u002Fdiv><div class=\"mono\" style=\"font-size:9px;letter-spacing:.12em;color:rgba(244,238,225,.5);margin-top:2px\">SCR {{ socScore }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;padding:16px;border-radius:12px;background:rgba(5,8,14,.5)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between\"><span class=\"mono\" style=\"font-size:11px;letter-spacing:.1em;color:rgba(244,238,225,.5)\">POSTING ACTIVITY · 8W<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:{{ socGrowthColor }}\">{{ socGrowth }}<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:12px;display:flex;align-items:flex-end;gap:6px;height:60px\">\n            <sc-for list=\"{{ socBars }}\" as=\"b\" hint-placeholder-count=\"8\">\n              <div style=\"flex:1;display:flex;align-items:flex-end;height:100%\"><div style=\"width:100%;border-radius:4px 4px 2px 2px;height:{{ b.h }};background:{{ b.color }};transform-origin:bottom;animation:growBar .7s cubic-bezier(.2,.8,.2,1) both\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:1px;border-radius:12px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(5,8,14,.5)\"><span style=\"font-size:13px;color:rgba(244,238,225,.7)\">Followers<\u002Fspan><span class=\"orb\" style=\"font-weight:700;font-size:17px\">{{ socFollowers }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(5,8,14,.5)\"><span style=\"font-size:13px;color:rgba(244,238,225,.7)\">Engagement <span style=\"color:rgba(244,238,225,.4);font-size:11px\">·avg 1–3%<\u002Fspan><\u002Fspan><span style=\"display:flex;align-items:center;gap:8px\"><span class=\"mono\" style=\"font-size:9px;padding:2px 7px;border-radius:5px;background:{{ socEngBg }};color:{{ socEngColor }}\">{{ socEngTag }}<\u002Fspan><span class=\"orb\" style=\"font-weight:700;font-size:17px;color:{{ socEngColor }}\">{{ socEngagement }}<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(5,8,14,.5)\"><span style=\"font-size:13px;color:rgba(244,238,225,.7)\">Cadence<\u002Fspan><span style=\"display:flex;align-items:center;gap:8px\"><span class=\"mono\" style=\"font-size:9px;padding:2px 7px;border-radius:5px;background:{{ socCadBg }};color:{{ socCadColor }}\">{{ socCadTag }}<\u002Fspan><span class=\"orb\" style=\"font-weight:700;font-size:17px;color:{{ socCadColor }}\">{{ socCadence }}<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ socialManager }}\" class=\"mono\" style=\"display:{{ liveBtnDisplay }};width:100%;justify-content:center;align-items:center;gap:8px;margin-top:14px;padding:12px;border-radius:10px;background:rgba(143,211,255,.12);border:1px solid rgba(143,211,255,.4);color:#8FD3FF;font-size:12px;font-weight:700;letter-spacing:.06em;cursor:pointer\">⚑ OPEN SOCIAL COMMAND ↗<\u002Fbutton>\n        <div style=\"margin-top:12px;padding:14px;border-radius:12px;background:rgba(231,185,107,.08);border:1px solid rgba(231,185,107,.2);font-size:13px;line-height:1.5;color:rgba(244,238,225,.72)\">{{ socNote }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- live consoles -->\n    <div class=\"hud reveal\" style=\"display:{{ liveBtnDisplay }};margin-top:16px;padding:26px 30px\">\n      <div class=\"mono\" style=\"font-size:11px;letter-spacing:.16em;color:rgba(91,231,196,.7)\">// LIVE PROBES · verify these numbers against source<\u002Fdiv>\n      <div style=\"margin-top:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px\">\n        <button sc-camel-on-click=\"{{ liveTest }}\" style=\"text-align:left;padding:18px;border-radius:14px;background:rgba(5,8,14,.5);border:1px solid rgba(91,231,196,.25);color:#F4EEE1;cursor:pointer\"><div class=\"orb\" style=\"font-size:20px;color:#5BE7C4\">⚡<\u002Fdiv><div style=\"margin-top:10px;font-weight:600;font-size:15px\">Live speed field test ↗<\u002Fdiv><div style=\"margin-top:3px;font-size:12px;color:rgba(244,238,225,.5)\">Real core-web-vitals report<\u002Fdiv><\u002Fbutton>\n        <button sc-camel-on-click=\"{{ googlePresence }}\" style=\"text-align:left;padding:18px;border-radius:14px;background:rgba(5,8,14,.5);border:1px solid rgba(143,211,255,.25);color:#F4EEE1;cursor:pointer\"><div class=\"orb\" style=\"font-size:20px;color:#8FD3FF\">◎<\u002Fdiv><div style=\"margin-top:10px;font-weight:600;font-size:15px\">Brand on search ↗<\u002Fdiv><div style=\"margin-top:3px;font-size:12px;color:rgba(244,238,225,.5)\">How you appear publicly<\u002Fdiv><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CTA -->\n    <div class=\"hud reveal\" style=\"margin-top:16px;overflow:hidden;padding:46px;text-align:center;border-color:rgba(231,185,107,.32)\">\n      <div style=\"position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:280px;background:conic-gradient(from 180deg at 50% 0, transparent, rgba(231,185,107,.16), transparent 40%);animation:beamRot 12s linear infinite;transform-origin:top center;pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:relative;display:inline-flex;animation:floatY 4s ease-in-out infinite\"><svg width=\"50\" height=\"50\" sc-camel-view-box=\"0 0 40 40\" fill=\"none\"><circle cx=\"20\" cy=\"12\" r=\"3.6\" fill=\"#E7B96B\"><\u002Fcircle><path d=\"M20 15.5V33M13 33h14\" stroke=\"#E7B96B\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M11.5 7 3.5 3.2M28.5 7l8-3.8M20 4V0.5\" stroke=\"#E7B96B\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h3 style=\"position:relative;margin:16px 0 0;font-family:'Bricolage Grotesque';font-weight:800;font-size:40px;letter-spacing:-.02em\">This is the 2-minute flyover.<\u002Fh3>\n      <p style=\"position:relative;margin:12px auto 0;font-size:17px;line-height:1.5;color:rgba(244,238,225,.7);max-width:560px\">Manara turns these signals into a site that converts — design, an AI chatbot &amp; social, run by one crew.<\u002Fp>\n      <div style=\"position:relative;margin-top:26px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n        <a href=\"https://manaraconsultancy.online\" target=\"_blank\" class=\"orb\" style=\"padding:16px 30px;border-radius:12px;background:linear-gradient(160deg,#F6D488,#E7B96B);color:#231703;font-weight:700;font-size:15px;letter-spacing:.04em\">DEPLOY MY UPGRADE →<\u002Fa>\n        <button sc-camel-on-click=\"{{ onReset }}\" class=\"orb\" style=\"padding:16px 30px;border-radius:12px;background:transparent;border:1px solid rgba(244,238,225,.25);color:#F4EEE1;font-weight:600;font-size:15px;letter-spacing:.04em;cursor:pointer\">SCAN ANOTHER<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"mono\" style=\"position:relative;z-index:2;text-align:center;padding:18px;font-size:12px;color:rgba(244,238,225,.35)\">MANARA CONSULTANCY · A FIXED POINT IN CHANGING WATERS · on-deck scores are indicative — live probes confirm them<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:860},&quot;formFactor&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Mobile&quot;,&quot;Desktop&quot;],&quot;default&quot;:&quot;Mobile&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Audit&quot;},&quot;showLiveLinks&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Audit&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen:'home', url:'', error:'', progress:0, scanIdx:0, logIdx:0, scores:null, sel:null,\n            disp:{ overall:0, cats:[0,0,0,0,0,0], dials:[0,0,0,0] } };\n\n  CATS = [\n    { key:'perf',   label:'Performance' }, { key:'mobile', label:'Accessibility' },\n    { key:'seo',    label:'SEO Signals' }, { key:'design', label:'Best Practices' },\n    { key:'social', label:'Core Web Vitals' }, { key:'conv', label:'Overall Health' },\n  ];\n  SHORT = ['Speed','A11y','SEO','Practices','Vitals','Overall'];\n  LOG = [\n    { at:5,  t:'> UPLINK ESTABLISHED', c:'#57E39A' },\n    { at:20, t:'> PROBING VELOCITY CORE…', c:'rgba(244,238,225,.8)' },\n    { at:36, t:'> LCP · INP · CLS CAPTURED', c:'rgba(244,238,225,.8)' },\n    { at:52, t:'> CRAWLING SEARCH INDEX…', c:'rgba(244,238,225,.8)' },\n    { at:68, t:'> MAPPING SOCIAL GRAPH…', c:'rgba(244,238,225,.8)' },\n    { at:84, t:'> RUNNING HEURISTICS…', c:'rgba(244,238,225,.8)' },\n    { at:96, t:'> COMPILING COMMAND DECK', c:'#5BE7C4' },\n  ];\n  NOTES = {\n    perf:{hi:'Loads fast — visitors stay.',lo:'Slow load is leaking visitors before they see you.'},\n    mobile:{hi:'Clean on phones.',lo:'Breaks on mobile — most traffic struggles.'},\n    seo:{hi:'Findable in search.',lo:'Weak SEO — new customers can\\u2019t find you.'},\n    design:{hi:'On-brand and clear.',lo:'Dated look undercuts trust at a glance.'},\n    social:{hi:'Active presence.',lo:'Quiet, inconsistent feed weakens credibility.'},\n    conv:{hi:'Clear path to act.',lo:'No obvious next step — interest goes nowhere.'},\n  };\n  FIX = {\n    perf:{t:'Boost load speed',x:'Optimize images and code to clear the 3s line where visitors bail.'},\n    mobile:{t:'Rebuild mobile-first',x:'70%+ of visits are on a phone. It must feel effortless there first.'},\n    seo:{t:'Fix search visibility',x:'Titles, structure and metadata so the right customers find you.'},\n    design:{t:'Modernize the brand look',x:'A current, cohesive design earns trust in 5 seconds.'},\n    social:{t:'Tighten the social rhythm',x:'A consistent calendar keeps you top-of-mind and credible.'},\n    conv:{t:'Add one clear CTA',x:'Every page should point to a single obvious next step.'},\n  };\n\n  hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }\n  rnd(s,salt){ return this.hash(s+':'+salt)/4294967295; }\n  scoreColor(v){ return v>=75?'#57E39A':v>=58?'#E7B96B':'#FF6B6B'; }\n  clean(u){ return (u||'').trim().replace(/^https?:\\/\\//i,'').replace(/\\/+$/,''); }\n  ff(){ /* Reads the live toggle, not the build-time prop. The prop is fixed at publish time, so the report kept printing MOBILE even when a desktop scan had actually run. */ if(window.__mnrDevice) return (window.__mnrDevice==='desktop') ? 'Desktop' : 'Mobile'; return (this.props.formFactor==='Desktop') ? 'Desktop' : 'Mobile'; }\n\n  compute(url){\n    const cats = this.CATS.map(c=>{ const v=Math.round(46+this.rnd(url,c.key)*49);\n      return { key:c.key, label:c.label, score:v, note: v>=68?this.NOTES[c.key].hi:this.NOTES[c.key].lo }; });\n    const overall = Math.round(cats.reduce((a,c)=>a+c.score,0)/cats.length);\n    const get = k => cats.find(c=>c.key===k).score;\n    const p=get('perf'), seo=get('seo');\n    const acc=Math.round(52+this.rnd(url,'acc')*46), bp=Math.round(50+this.rnd(url,'bp')*48);\n\n    // core web vitals derived from perf\n    const q=p/100;\n    const st=(ok,mid)=> ok?{c:'#57E39A',t:'GOOD'} : mid?{c:'#E7B96B',t:'NEEDS WORK'} : {c:'#FF6B6B',t:'POOR'};\n    const lcp=+(4.6-q*3.0).toFixed(1), inp=Math.round(430-q*300), cls=+(0.30-q*0.27).toFixed(2), tbt=Math.round(560-q*470), si=+(5.6-q*3.7).toFixed(1);\n    const cwv=[\n      Object.assign({key:'LCP',val:lcp+'s',label:'Largest paint'}, st(lcp<2.5,lcp<4)),\n      Object.assign({key:'INP',val:inp+'ms',label:'Interaction'}, st(inp<200,inp<500)),\n      Object.assign({key:'CLS',val:cls.toFixed(2),label:'Layout shift'}, st(cls<0.1,cls<0.25)),\n      Object.assign({key:'TBT',val:tbt+'ms',label:'Blocking time'}, st(tbt<200,tbt<600)),\n      Object.assign({key:'SI',val:si+'s',label:'Speed index'}, st(si<3.4,si<5.8)),\n    ];\n\n    const findings = cats.filter(c=>c.score<74).sort((a,b)=>a.score-b.score).slice(0,4).map(c=>{\n      const hi=c.score<58; return { sev:hi?'CRITICAL':'MAJOR', sevColor:hi?'#FF6B6B':'#E7B96B',\n        sevBg:hi?'rgba(255,107,107,.14)':'rgba(231,185,107,.14)', title:this.FIX[c.key].t, text:this.FIX[c.key].x }; });\n    if(!findings.length) findings.push({sev:'CLEAR',sevColor:'#57E39A',sevBg:'rgba(87,227,154,.14)',title:'Strong across the board',text:'Solid foundation. Layer an AI chatbot + social to compound results.'});\n\n    // channel scores (always enabled, real numbers)\n    const rate=v=>v>=75?'GOOD':v>=58?'FAIR':'POOR';\n    const bord=v=>v>=75?'rgba(87,227,154,.45)':v>=58?'rgba(231,185,107,.45)':'rgba(255,107,107,.45)';\n    const badges=[\n      { icon:'⚡', label:'VELOCITY',    metric:'Load speed',   v:p },\n      { icon:'⌕', label:'DISCOVERABLE', metric:'Search / SEO', v:seo },\n      { icon:'📡', label:'SIGNAL',      metric:'Social reach',  v:get('social') },\n      { icon:'🎯', label:'CONVERTS',    metric:'Conversion',    v:get('conv') },\n    ].map(b=>{ const col=this.scoreColor(b.v); return { icon:b.icon, label:b.label, metric:b.metric,\n      value:b.v, pct:b.v+'%', status:rate(b.v), color:col, border:bord(b.v),\n      filter:'drop-shadow(0 0 8px '+col+')' }; });\n\n    // social graph\n    const sS=get('social');\n    const grd=v=>v>=82?{g:'A',c:'#57E39A'}:v>=68?{g:'B',c:'#9FD17A'}:v>=56?{g:'C',c:'#E7B96B'}:{g:'D',c:'#FF6B6B'};\n    const tg=(ok,mid)=>ok?{t:'STRONG',c:'#57E39A',b:'rgba(87,227,154,.14)'}:mid?{t:'FAIR',c:'#E7B96B',b:'rgba(231,185,107,.14)'}:{t:'WEAK',c:'#FF6B6B',b:'rgba(255,107,107,.14)'};\n    const gi=grd(sS); const handle='@'+(url.split('.')[0]||'brand').replace(/[^a-z0-9]/gi,'').slice(0,18);\n    const fRaw=Math.round(300+this.rnd(url,'foll')*22000); const followers=fRaw>=1000?(fRaw/1000).toFixed(1)+'K':''+fRaw;\n    const eng=+(0.6+(sS/100)*3.6+this.rnd(url,'eng')*0.5).toFixed(1); const et=tg(eng>=2.5,eng>=1.2);\n    const perWeek=+(1+(sS/100)*6+this.rnd(url,'cad')*1.2).toFixed(1); const ct=tg(perWeek>=4,perWeek>=2);\n    const bars=Array.from({length:8},(_,i)=>{ const base=26+(sS/100)*46;\n      const h=Math.max(14,Math.min(100,Math.round(base+(this.rnd(url,'wk'+i)-0.5)*44+(i-4)*(sS>66?3:-2))));\n      return { h:h+'%', color:i===7?gi.c:'rgba(143,211,255,.5)' }; });\n    const gN=Math.round((sS-58)/2+(this.rnd(url,'grw')-0.4)*8);\n    const social={ handle,followers,score:sS,grade:gi.g,gradeColor:gi.c,\n      eng:eng+'%',engColor:et.c,engTag:et.t,engBg:et.b, cadence:perWeek+'/wk',cadColor:ct.c,cadTag:ct.t,cadBg:ct.b,\n      bars, growth:(gN>=0?'▲ +':'▼ ')+Math.abs(gN)+'%/30d', growthColor:gN>=0?'#57E39A':'#FF6B6B',\n      note: sS<58?'Irregular posting + low engagement cap your reach. A steady calendar and stronger hooks is the fastest win.'\n           :sS<72?'A workable base. Tighten cadence and reply faster to convert followers into customers.'\n           :'Healthy presence. Now turn attention into bookings with clearer calls-to-action.' };\n\n    const dials=[{label:'Performance',v:p},{label:'Accessibility',v:acc},{label:'Best Practices',v:bp},{label:'SEO',v:seo}];\n    return { url, cats, overall, dials, cwv, findings, badges, social, missionId:'MNR-'+(this.hash(url)%9000+1000) };\n  }\n\n  onInput=(e)=>this.setState({url:e.target.value,error:''});\n  onKey=(e)=>{ if(e.key==='Enter') this.onRun(); };\n  pick=(v)=>this.setState({url:v,error:''});\n  pick1=()=>this.pick('bloomcafe.com'); pick2=()=>this.pick('nova-clinic.co'); pick3=()=>this.pick('atlas-store.shop');\n\n  target(){ return 'https://'+this.clean(this.state.url || (this.state.scores&&this.state.scores.url) || ''); }\n  liveTest=()=>window.open('https://pagespeed.web.dev/analysis?url='+encodeURIComponent(this.target())+'&form_factor='+(this.ff()==='Desktop'?'desktop':'mobile'),'_blank');\n  altTest=()=>window.open('https://tools.pingdom.com/','_blank');\n  indexConsole=()=>window.open('https://search.google.com/search-console','_blank');\n  googlePresence=()=>window.open('https://www.google.com/search?q='+encodeURIComponent(this.clean(this.target())),'_blank');\n  socialManager=()=>window.open('https://business.facebook.com/','_blank');\n\n  onRun=()=>{\n    const u=this.clean(this.state.url);\n    if(u.length<3 || !u.includes('.')){ this.setState({error:'INVALID TARGET · try yourbrand.com'}); return; }\n    /* Real Lighthouse run via the Worker. The animation below now waits for\n       it rather than racing a fake 4-second timer: a genuine scan takes\n       10-30s, so progress holds at 92% until the data lands. */\n    const dev = (window.__mnrDevice==='desktop') ? 'desktop' : 'mobile';\n    this._real = null; this._realErr = null;\n    window.__mnrReal(u, dev).then(r=>{ this._real = r; }).catch(e=>{ this._realErr = e; });\n    this._soc = null;\n    window.__mnrSocial(u).then(r=>{ this._soc = r; });\n    const scores=this.compute(u);\n    this.setState({ screen:'scanning', progress:0, scanIdx:0, logIdx:0, scores, sel:null, disp:{overall:0,cats:[0,0,0,0,0,0],dials:[0,0,0,0]} });\n    clearInterval(this._scan);\n    this._scan=setInterval(()=>{\n      this.setState(s=>{\n        var cap = (this._real || this._realErr) ? 100 : 92;\n        const p=Math.min(cap, s.progress + 1.6 + Math.random()*2);\n        let li=s.logIdx; while(li<this.LOG.length && this.LOG[li].at<=p) li++;\n        const idx=Math.min(5,Math.floor(p/16.7));\n        if(p>=100){ clearInterval(this._scan);\n          if(this._real){ try{ s.scores = window.__mnrApply(s.scores, this._real); }catch(e){} }\n          if(this._soc){ try{ s.scores = window.__mnrApplySocial(s.scores, this._soc); }catch(e){} }\n          setTimeout(()=>this.reveal(),340); }\n        return { progress:p, scanIdx:idx, logIdx:li };\n      });\n    },70);\n  };\n\n  reveal=()=>{\n    this.setState({screen:'report'}); const t=this.state.scores; if(!t) return;\n    const t0=performance.now(), dur=1300, ease=x=>1-Math.pow(1-x,3);\n    cancelAnimationFrame(this._raf);\n    const step=(now)=>{ const p=Math.min(1,(now-t0)/dur), e=ease(p);\n      this.setState({ disp:{ overall:t.overall*e, cats:t.cats.map(c=>c.score*e), dials:t.dials.map(d=>d.v*e) } });\n      if(p<1) this._raf=requestAnimationFrame(step); };\n    this._raf=requestAnimationFrame(step);\n  };\n  onReset=()=>{ clearInterval(this._scan); cancelAnimationFrame(this._raf);\n    this.setState({screen:'home',progress:0,scores:null,error:'',disp:{overall:0,cats:[0,0,0,0,0,0],dials:[0,0,0,0]}}); };\n  componentWillUnmount(){ clearInterval(this._scan); cancelAnimationFrame(this._raf); }\n\n  radar(vals){ const cx=150,cy=150,R=110; return vals.map((v,i)=>{ const a=(-90+i*60)*Math.PI/180, r=R*Math.max(.04,v/100);\n    return (cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1); }).join(' '); }\n\n  renderVals(){\n    const s=this.state, sc=s.scores;\n    const live=(this.props.showLiveLinks!==false);\n    const doneLog=this.LOG.slice(0,s.logIdx).map(l=>({text:l.t,color:l.c}));\n    const dispOverall=Math.round(s.disp.overall);\n    const oT=sc?sc.overall:0;\n    const gI = oT>=85?{g:'A',c:'#57E39A',gl:'rgba(87,227,154,.5)',l:'Beacon-bright',n:'Commanding presence. Small tweaks, big compounding.'}\n             : oT>=70?{g:'B',c:'#5BE7C4',gl:'rgba(91,231,196,.5)',l:'Shining',n:'Solid footing with clear room to pull ahead.'}\n             : oT>=55?{g:'C',c:'#E7B96B',gl:'rgba(231,185,107,.5)',l:'Flickering',n:'The basics wobble. A focused revamp moves fast.'}\n             : {g:'D',c:'#FF6B6B',gl:'rgba(255,107,107,.5)',l:'In the dark',n:'Customers slip past unseen. Costing you sales today.'};\n    const gaugeCol = sc?gI.c:'#5BE7C4', gAng=dispOverall*3.6;\n    // resolved selection (defaults to weakest channel)\n    let selIdx = s.sel;\n    if(sc && selIdx==null){ selIdx = sc.cats.reduce((m,c,i,a)=>c.score<a[m].score?i:m,0); }\n    const cats = sc?sc.cats.map((c,i)=>{ const val=Math.round(s.disp.cats[i]); const col=this.scoreColor(c.score);\n      const isSel=(i===selIdx);\n      return { label:c.label, short:this.SHORT[i], score:val, pct:val+'%', color:col, note:c.note,\n        rating: c.score>=75?'GOOD':c.score>=58?'FAIR':'POOR',\n        ratingBg: c.score>=75?'rgba(87,227,154,.14)':c.score>=58?'rgba(231,185,107,.14)':'rgba(255,107,107,.14)',\n        onSelect: ()=>this.setState({sel:i}),\n        rowBg: isSel?'rgba(91,231,196,.08)':'transparent',\n        rowBorder: isSel?col:'transparent' }; }):[];\n    // interactive detail for the selected channel\n    let detail = { label:'', score:0, color:'#5BE7C4', note:'', fix:'' };\n    if(sc){ const c=sc.cats[selIdx]; detail={ label:c.label, score:c.score, color:this.scoreColor(c.score),\n      note:c.note, fix:this.FIX[c.key].t+' — '+this.FIX[c.key].x }; }\n    // radar axis labels + evaluation dots\n    const axis = cats.map((c,i)=>{\n      const ang=(-90+i*60)*Math.PI/180, cos=Math.cos(ang), sin=Math.sin(ang);\n      const rv=110*Math.max(.04,c.score/100);\n      const anchor = cos>0.3?'start':cos<-0.3?'end':'middle';\n      const lyBase = 150+150*sin;\n      const isSel=(i===selIdx);\n      return { px:(150+rv*cos).toFixed(1), py:(150+rv*sin).toFixed(1),\n        lx:(150+152*cos).toFixed(1),\n        ly:(lyBase+(sin<-0.3?-4:sin>0.3?12:4)).toFixed(1),\n        sy:(lyBase+(sin<-0.3?12:sin>0.3?28:20)).toFixed(1),\n        anchor, label:c.short, score:c.score, color:c.color,\n        dotR:isSel?6:4, ringOp:isSel?0.9:0, onSelect:()=>this.setState({sel:i}) };\n    });\n    const strongest = sc? [...sc.cats].sort((a,b)=>b.score-a.score)[0] : null;\n    const weakest = sc? [...sc.cats].sort((a,b)=>a.score-b.score)[0] : null;\n    const verdict = sc? ('Strongest channel: '+strongest.label+' ('+strongest.score+'). Weakest: '+weakest.label+' ('+weakest.score+') — fix this first for the biggest lift.') : '';\n    const dials = sc?sc.dials.map((d,i)=>{ const v=Math.round(s.disp.dials[i]); const col=this.scoreColor(d.v); const a=v*3.6;\n      return { label:d.label, val:v, color:col, gauge:'conic-gradient('+col+' '+a+'deg, rgba(244,238,225,.1) '+a+'deg)' }; }):[];\n\n    return {\n      homeDisplay: s.screen==='home'?'flex':'none',\n      scanDisplay: s.screen==='scanning'?'flex':'none',\n      reportDisplay: s.screen==='report'?'block':'none',\n      url:s.url, errorMsg:s.error, onInput:this.onInput, onKey:this.onKey, onRun:this.onRun,\n      pick1:this.pick1, pick2:this.pick2, pick3:this.pick3,\n      progressLabel: Math.round(s.progress)+'%', log:doneLog, caret:'> '+ (this.LOG[Math.min(s.scanIdx,this.LOG.length-1)]? '' : ''),\n      missionId: sc?sc.missionId:'', auditedUrl: sc?sc.url:'',\n      auditDate:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'}).toUpperCase(),\n      formFactorLabel: this.ff().toUpperCase(),\n      onReset:this.onReset,\n      overallDisp:dispOverall,\n      overallGauge:'conic-gradient('+gaugeCol+' '+gAng+'deg, rgba(244,238,225,.1) '+gAng+'deg)',\n      grade:gI.g, gradeColor:gI.c, gradeGlow:gI.gl, gradeLabel:gI.l, gradeNote:gI.n,\n      radarPoints:this.radar(sc?cats.map((c,i)=>Math.round(s.disp.cats[i])):[0,0,0,0,0,0]),\n      axis, verdict, cats, detail,\n      cwv: sc?sc.cwv.map(v=>({key:v.key,val:v.val,tag:v.t,label:v.label,color:v.c})):[],\n      dials, badges: sc?sc.badges:[],\n      findings: sc?sc.findings:[], findingCount: sc?sc.findings.length:0,\n      liveTest:this.liveTest, altTest:this.altTest, indexConsole:this.indexConsole, googlePresence:this.googlePresence, socialManager:this.socialManager,\n      liveBtnDisplay: live?'flex':'none',\n      socHandle: sc?sc.social.handle:'', socGrade: sc?sc.social.grade:'—', socGradeColor: sc?sc.social.gradeColor:'#8FD3FF', socScore: sc?sc.social.score:0,\n      socFollowers: sc?sc.social.followers:'—',\n      socEngagement: sc?sc.social.eng:'—', socEngColor: sc?sc.social.engColor:'#F4EEE1', socEngTag: sc?sc.social.engTag:'', socEngBg: sc?sc.social.engBg:'transparent',\n      socCadence: sc?sc.social.cadence:'—', socCadColor: sc?sc.social.cadColor:'#F4EEE1', socCadTag: sc?sc.social.cadTag:'', socCadBg: sc?sc.social.cadBg:'transparent',\n      socBars: sc?sc.social.bars:[], socGrowth: sc?sc.social.growth:'', socGrowthColor: sc?sc.social.growthColor:'#8FD3FF', socNote: sc?sc.social.note:'',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<script>
/* Back navigation for the Audit Lab.
   Two affordances, because they do different jobs:
     - "Manara"  always goes to the site home, wherever the visitor came from
     - "Back"    steps back in history, but only when there IS history to step
                 back to; opened in a fresh tab it falls back to the homepage. */
(function () {
  function mount() {
    if (document.getElementById('mnr-audit-back')) return;

    var bar = document.createElement('div');
    bar.id = 'mnr-audit-back';
    bar.style.cssText =
      'position:fixed;top:16px;left:16px;z-index:2147483000;display:flex;gap:8px;' +
      'align-items:center;font-family:system-ui,-apple-system,sans-serif;';

    function pill(label, title) {
      var a = document.createElement('button');
      a.type = 'button';
      a.textContent = label;
      a.title = title;
      a.style.cssText =
        'cursor:pointer;font:600 12.5px/1 system-ui,sans-serif;letter-spacing:.04em;' +
        'color:#E6CC8C;background:rgba(8,16,28,.72);border:1px solid rgba(230,204,140,.45);' +
        'border-radius:999px;padding:10px 15px;backdrop-filter:blur(8px);' +
        '-webkit-backdrop-filter:blur(8px);white-space:nowrap;';
      a.onmouseenter = function () { a.style.background = 'rgba(230,204,140,.18)'; };
      a.onmouseleave = function () { a.style.background = 'rgba(8,16,28,.72)'; };
      return a;
    }

    var home = pill('\u2190 Manara', 'Back to the Manara website');
    home.addEventListener('click', function () { window.location.href = 'index.html'; });

    var back = pill('Back', 'Go back');
    back.addEventListener('click', function () {
      if (window.history.length > 1) window.history.back();
      else window.location.href = 'index.html';
    });

    bar.appendChild(home);
    bar.appendChild(back);
    document.body.appendChild(bar);
  }

  ensureMobileCss();
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mount);
  } else {
    mount();
  }
  // the page's own runtime rebuilds the body; re-assert if we get wiped
  setInterval(mount, 1000);
})();
</script>

<script>
/* Audit bridge: real Lighthouse data + a device toggle.
   Lives outside the bundled markup deliberately — that markup is JSON, and this
   needs to be editable without risking the whole page. Exposes two functions the
   component calls (__mnrReal, __mnrApply) and owns the Mobile/Desktop switch. */
(function () {
  var ENDPOINT = 'https://manara-quote.mya-moubarak.workers.dev/audit';
  window.__mnrDevice = 'mobile';

  /* ---------- real scan ---------- */
  window.__mnrSocial = function (url) {
    return fetch('https://manara-quote.mya-moubarak.workers.dev/social', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url })
    }).then(function (r) { return r.json(); })
      .then(function (j) { return (j && !j.error) ? j : null; })
      .catch(function () { return null; });
  };

  window.__mnrReal = function (url, device) {
    return fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url, strategy: device })
    }).then(function (r) {
      return r.json().then(function (j) {
        if (!r.ok || j.error) throw new Error(j.error || ('HTTP ' + r.status));
        return j;
      });
    });
  };

  /* Core Web Vitals as a pass rate, using Google's own thresholds rather than
     an invented curve: each of the five either passes or it does not. */
  function vitalsScore(m) {
    if (!m) return null;
    var checks = [
      m.lcp && m.lcp.ms != null ? m.lcp.ms <= 2500 : null,
      m.fcp && m.fcp.ms != null ? m.fcp.ms <= 1800 : null,
      m.cls && m.cls.value != null ? m.cls.value <= 0.1 : null,
      m.tbt && m.tbt.ms != null ? m.tbt.ms <= 200 : null,
      m.si && m.si.ms != null ? m.si.ms <= 3400 : null
    ].filter(function (v) { return v !== null; });
    if (!checks.length) return null;
    var passed = checks.filter(Boolean).length;
    return Math.round((passed / checks.length) * 100);
  }

  /* ---------- map measured values onto the existing report shape ---------- */
  window.__mnrApply = function (scores, real) {
    if (!scores || !real || !real.scores) return scores;
    var s = real.scores, m = real.metrics || {};

    var vitals = vitalsScore(m);
    var parts = [s.performance, s.accessibility, s.seo, s.bestPractices]
                  .filter(function (v) { return typeof v === 'number'; });
    var overall = parts.length
      ? Math.round(parts.reduce(function (a, b) { return a + b; }, 0) / parts.length)
      : null;

    var map = {
      perf:   s.performance,
      mobile: s.accessibility,
      seo:    s.seo,
      design: s.bestPractices,
      social: vitals,
      conv:   overall
    };

    scores.cats = scores.cats.map(function (c) {
      var v = map[c.key];
      if (typeof v !== 'number') return c;
      return { key: c.key, label: c.label, score: v, note: c.note };
    });

    var nums = scores.cats.map(function (c) { return c.score; });
    scores.overall = Math.round(nums.reduce(function (a, b) { return a + b; }, 0) / nums.length);

    if (scores.dials && scores.dials.length >= 4) {
      scores.dials = [
        { label: 'Performance',    v: s.performance },
        { label: 'Accessibility',  v: s.accessibility },
        { label: 'Best Practices', v: s.bestPractices },
        { label: 'SEO',            v: s.seo }
      ];
    }

    // real Core Web Vitals, measured rather than derived from a score
    function band(ok, mid) {
      return ok ? { c: '#57E39A', t: 'GOOD' }
                : (mid ? { c: '#E7B96B', t: 'NEEDS WORK' } : { c: '#FF6B6B', t: 'POOR' });
    }
    if (m.lcp && m.lcp.ms != null) {
      scores.cwv = [
        Object.assign({ key: 'LCP', val: m.lcp.text || '', label: 'Largest paint' },
                      band(m.lcp.ms <= 2500, m.lcp.ms <= 4000)),
        Object.assign({ key: 'FCP', val: m.fcp.text || '', label: 'First paint' },
                      band(m.fcp.ms <= 1800, m.fcp.ms <= 3000)),
        Object.assign({ key: 'CLS', val: m.cls.text || '', label: 'Layout shift' },
                      band(m.cls.value <= 0.1, m.cls.value <= 0.25)),
        Object.assign({ key: 'TBT', val: m.tbt.text || '', label: 'Blocking time' },
                      band(m.tbt.ms <= 200, m.tbt.ms <= 600)),
        Object.assign({ key: 'SI',  val: m.si.text || '', label: 'Speed index' },
                      band(m.si.ms <= 3400, m.si.ms <= 5800))
      ];
    }
    return scores;
  };

  /* Replaces the fabricated social block. The old one invented a handle, a
     follower count, an engagement rate, a posting cadence and a 30-day growth
     figure - none of which any public API exposes for a third-party site. What
     replaces them is only what the page itself proves. */
  window.__mnrApplySocial = function (scores, soc) {
    if (!scores || !scores.social || !soc) return scores;
    var s = scores.social;
    var passed = (soc.checks || []).filter(function (c) { return c.pass; }).length;
    var total  = (soc.checks || []).length || 8;

    var gradeColor = soc.score >= 75 ? '#57E39A' : soc.score >= 55 ? '#E7B96B' : '#FF6B6B';

    s.score      = soc.score;
    s.grade      = soc.grade;
    s.gradeColor = gradeColor;

    // the handle line now shows what was actually found, not an invented @name
    s.handle    = soc.profiles && soc.profiles.length
                    ? soc.profiles.map(function (p) { return p.platform; }).join(' · ')
                    : 'No profiles linked on the page';
    s.followers = passed + '/' + total + ' checks passed';

    s.eng      = soc.score + '%';
    s.engTag   = 'SHARE READY';
    s.engColor = gradeColor;

    s.cadence  = (soc.profiles ? soc.profiles.length : 0) + ' platforms';
    s.cadColor = gradeColor;
    s.cadTag   = 'LINKED';

    // bars become the individual checks: tall = passed, short = missing
    if (soc.checks && soc.checks.length) {
      s.bars = soc.checks.slice(0, 8).map(function (c) {
        return { h: (c.pass ? 92 : 22) + '%',
                 color: c.pass ? 'rgba(87,227,154,.75)' : 'rgba(255,107,107,.45)' };
      });
    }

    // no invented trend - state what is missing instead
    s.growth      = soc.missing && soc.missing.length
                      ? soc.missing.length + ' to fix'
                      : 'all checks passed';
    s.growthColor = (soc.missing && soc.missing.length) ? '#E7B96B' : '#57E39A';
    s.note        = soc.note || '';
    return scores;
  };

  /* ---------- Mobile / Desktop toggle ---------- */
  /* Repainted from the live DOM each time, so it works no matter how often the
     page rebuilds the buttons. */
  /* On a phone the URL input and the SCAN button share one flex row, and the
     button's fixed width squeezed the input down to 8px - impossible to type in.
     Stacking them is the fix; applied inline because the row has no class to
     target, and re-applied on the same interval since the page rebuilds it. */
  function fixMobileInput() {
    if (!window.matchMedia('(max-width: 760px)').matches) return;
    var input = document.querySelector('input[type="text"], input:not([type])');
    if (!input) return;
    var row = input.parentElement;
    if (!row) return;
    var cs = getComputedStyle(row);
    if (cs.display.indexOf('flex') > -1) {
      row.style.flexDirection = 'column';
      row.style.alignItems = 'stretch';
      row.style.gap = '10px';
    }
    input.style.width = '100%';
    input.style.minWidth = '0';
    input.style.flex = '1 1 auto';
    var btn = row.querySelector('button');
    if (btn) { btn.style.width = '100%'; btn.style.flex = '0 0 auto'; }
  }

  /* The runtime clears <head> styles, so a static <style> tag silently vanished -
     the mobile layout fixes never applied. Re-appended on the same interval that
     re-asserts the toggle. */
  var MOBILE_CSS = "\n/* Mobile layout repair for the report.\n   The report was built as a multi-column desktop grid: at 390px the panels sat\n   side by side, so the signal map and the score dial were cut off at both edges\n   and the URL headline ran past the screen. Inline styles carry the original\n   values, so these need !important to win. */\n@media (max-width: 760px) {\n\n  /* every multi-column panel row collapses to one column */\n  #root div[style*=\"grid-template-columns\"],\n  body div[style*=\"grid-template-columns\"] {\n    grid-template-columns: 1fr !important;\n  }\n\n  /* side-by-side flex rows wrap instead of overflowing */\n  body div[style*=\"display:flex\"][style*=\"gap\"] {\n    flex-wrap: wrap !important;\n  }\n\n  /* the scanned URL: was a huge single line that ran off-screen */\n  .orb, h1, h2 {\n    font-size: clamp(20px, 6.5vw, 34px) !important;\n    line-height: 1.15 !important;\n    overflow-wrap: anywhere !important;\n    word-break: break-word !important;\n    max-width: 100% !important;\n  }\n\n  /* panels must never exceed the viewport */\n  section, article, main > div, div[style*=\"border-radius\"] {\n    max-width: 100% !important;\n    box-sizing: border-box !important;\n  }\n\n  /* charts and dials scale down rather than clip */\n  svg { max-width: 100% !important; height: auto !important; }\n\n  /* the back bar was sitting on top of the Manara wordmark */\n  #mnr-audit-back {\n    position: static !important;\n    display: flex !important;\n    justify-content: flex-start !important;\n    padding: 10px 14px 0 !important;\n    transform: none !important;\n  }\n\n  /* wide legends and metric rows wrap */\n  body div[style*=\"justify-content:space-between\"] { flex-wrap: wrap !important; row-gap: 6px !important; }\n}\n\n  /* Digits must never break across lines. The wrap rules above squeezed the\n     score cells until \"56\" rendered as 5 above 6 and \"100\" as 10 above 0. */\n  [class*=\"score\"], [class*=\"num\"], .stat-num,\n  div[style*=\"font-size:38px\"], div[style*=\"font-size:34px\"],\n  span[style*=\"font-variant-numeric\"] {\n    white-space: nowrap !important;\n    word-break: keep-all !important;\n    overflow-wrap: normal !important;\n  }\n\n  /* the metric rows keep label / bar / score on one line */\n  body div[style*=\"justify-content:space-between\"] {\n    flex-wrap: nowrap !important;\n    align-items: center !important;\n    gap: 8px !important;\n  }\n";
  function ensureMobileCss() {
    if (document.getElementById('mnr-audit-mobile-css')) return;
    var s = document.createElement('style');
    s.id = 'mnr-audit-mobile-css';
    s.textContent = MOBILE_CSS;
    (document.head || document.documentElement).appendChild(s);
  }

  function paintToggle() {
    var btns = document.querySelectorAll('[data-mnr-device]');
    for (var i = 0; i < btns.length; i++) {
      var b = btns[i];
      var on = b.getAttribute('data-mnr-device') === window.__mnrDevice;
      b.style.background = on ? 'rgba(87,227,154,.14)' : 'transparent';
      b.style.color = on ? '#57E39A' : '#5f7d8c';
      b.style.border = '1px solid ' + (on ? 'rgba(87,227,154,.5)' : 'rgba(95,125,140,.3)');
    }
  }

  document.addEventListener('click', function (e) {
    var hit = e.target && e.target.closest ? e.target.closest('[data-mnr-device]') : null;
    if (!hit) return;
    e.preventDefault();
    window.__mnrDevice = hit.getAttribute('data-mnr-device');
    paintToggle();
  }, true);


  function mount() {
    if (document.getElementById('mnr-device-toggle')) return;
    var input = document.querySelector('input[type="text"], input:not([type])');
    if (!input) return;

    var wrap = document.createElement('div');
    wrap.id = 'mnr-device-toggle';
    wrap.style.cssText =
      'display:flex;gap:8px;align-items:center;margin:14px 0 0;' +
      'font-family:ui-monospace,SFMono-Regular,Menlo,monospace;';

    var label = document.createElement('span');
    label.textContent = 'SCAN AS';
    label.style.cssText = 'font-size:11px;letter-spacing:.18em;color:#5f7d8c;margin-right:2px;';
    wrap.appendChild(label);

    /* No per-element listeners here. The page re-serialises this container, which
       produces fresh nodes carrying the same id — so mount() sees the id, skips
       re-attaching, and the buttons go dead. A delegated listener on document
       survives that, because it never depends on the node identity. */
    function pill(text, device) {
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = text;
      b.setAttribute('data-mnr-device', device);
      b.style.cssText =
        'cursor:pointer;font:600 11.5px/1 ui-monospace,monospace;letter-spacing:.12em;' +
        'padding:8px 15px;border-radius:6px;transition:all .2s;';
      return b;
    }

    var desk = pill('DESKTOP', 'desktop');
    var mob = pill('MOBILE', 'mobile');
    wrap.appendChild(desk);   // desktop first, as requested
    wrap.appendChild(mob);
    paintToggle();

    var host = input.parentElement && input.parentElement.parentElement;
    (host || input.parentElement).appendChild(wrap);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mount);
  } else {
    mount();
  }
  // Re-assert both the toggle and its painted state. The page rebuilds this
  // region, which can leave the buttons showing a stale selection even though
  // the delegated click handler updated the value correctly.
  setInterval(function () { mount(); paintToggle(); fixMobileInput(); ensureMobileCss(); }, 1000);
})();
</script>
</body>
</html>
